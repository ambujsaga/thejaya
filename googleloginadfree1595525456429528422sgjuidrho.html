<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaya Chats</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.85); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --green: #00e676;
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Styling */
        header { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-btn {
            background: transparent;
            color: var(--primary);
            font-size: 24px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-shadow: var(--neon-shadow); }

        /* Main Container layout split or single active chat view */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .chat-list-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
            overflow-y: auto;
        }

        .chat-view-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: none;
            flex-direction: column;
            z-index: 500;
        }

        /* Feed Cards */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .chat-item:hover { background: rgba(0, 229, 255, 0.05); }

        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin-right: 15px; }
        .chat-info { flex: 1; display: flex; flex-direction: column; }
        .chat-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .chat-last-msg { font-size: 13px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Unread Indicator Symbol */
        .unread-symbol {
            width: 12px; height: 12px; background: var(--primary); border-radius: 50%;
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            box-shadow: var(--neon-shadow);
        }

        /* Floating Bottom Center Add Button */
        .fab-center {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--neon-shadow); z-index: 999; cursor: pointer;
            font-size: 28px; color: #030a1a; font-weight: bold; transition: 0.3s;
        }
        .fab-center:hover { transform: translateX(-50%) scale(1.08); }

        /* Search Drawer/Modal Overlay */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(3, 10, 26, 0.9);
            backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: var(--card-bg); border: 1px solid var(--primary); border-radius: 20px;
            width: 100%; max-width: 400px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-card h3 { margin-top: 0; color: var(--primary); }

        input[type="text"], input[type="search"] {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; padding: 12px; color: var(--text-main); box-sizing: border-box; outline: none; margin-bottom: 15px;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .search-user-item {
            display: flex; align-items: center; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Buttons */
        .btn { background: var(--primary); color: #030a1a; padding: 8px 14px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        .btn-danger { background: var(--red); color: white; }

        /* Messages Window inside Active Chat */
        .chat-header {
            padding: 12px 20px; background: var(--card-bg); border-bottom: 1px solid rgba(0, 229, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
        }
        .messages-log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .bubble {
            max-width: 70%; padding: 12px 16px; border-radius: 16px; position: relative;
            font-size: 15px; line-height: 1.4; word-wrap: break-word; cursor: pointer;
        }
        .sent .bubble { background: rgba(0, 229, 255, 0.15); border: 1px solid rgba(0, 229, 255, 0.3); border-bottom-right-radius: 4px; color: #fff; }
        .received .bubble { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom-left-radius: 4px; color: #fff; }
        
        .msg-meta { font-size: 10px; color: var(--text-muted); margin-top: 5px; display: flex; justify-content: flex-end; gap: 6px; align-items: center; }
        .edited-tag { color: var(--primary); font-style: italic; }
        .seen-status { color: var(--green); font-weight: bold; }

        /* Media Message elements */
        .msg-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; max-height: 250px; object-fit: cover; }
        .download-btn {
            background: rgba(3, 10, 26, 0.8); color: var(--primary); border: 1px solid var(--primary);
            font-size: 11px; padding: 4px 8px; border-radius: 6px; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; text-decoration: none;
        }

        /* Message Controls Menu (Edit/Delete) */
        .context-menu {
            display: none; position: fixed; background: #061127; border: 1px solid var(--primary);
            border-radius: 12px; z-index: 3000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); overflow: hidden;
        }
        .context-option { padding: 12px 20px; font-size: 14px; cursor: pointer; color: white; transition: 0.2s; }
        .context-option:hover { background: rgba(0, 229, 255, 0.15); }

        /* Input Area bar */
        .input-tray {
            padding: 15px; background: var(--card-bg); border-top: 1px solid rgba(0, 229, 255, 0.15);
            display: flex; align-items: center; gap: 10px;
        }
        .input-tray textarea {
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px; color: white; resize: none; height: 20px; outline: none; font-size: 14px;
        }
        .input-tray textarea:focus { border-color: var(--primary); }

        /* Call Overlay Panels (Voice / Video) */
        .call-screen {
            display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #030a1a, #061127);
            z-index: 5000; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px;
        }
        .call-user-details { text-align: center; margin-top: 40px; }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; box-shadow: var(--neon-shadow); }
        .call-status-label { color: var(--primary); margin-top: 15px; font-size: 18px; letter-spacing: 1px; animation: pulse 1.5s infinite; }
        .call-controls { display: flex; gap: 25px; margin-bottom: 40px; }
        .call-btn-circle {
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; border: none; font-size: 14px; transition: 0.2s;
        }
        .call-btn-circle.mute { background: rgba(255,255,255,0.1); color: white; }
        .call-btn-circle.speaker { background: rgba(255,255,255,0.1); color: white; }
        .call-btn-circle.speaker.active { background: var(--primary); color: #030a1a; box-shadow: var(--neon-shadow); }
        .call-btn-circle.hangup { background: var(--red); color: white; }

        /* Red Tick Template Class matching index(1).html */
        .red-tick-svg {
            width: 16px; height: 16px; fill: #ff4444; margin-left: 5px;
            vertical-align: middle; filter: drop-shadow(0 0 4px rgba(255, 68, 68, 0.5));
            display: inline-block;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <svg style="display:none;">
        <g id="red-tick-icon">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </g>
    </svg>

    <header>
        <button class="back-btn" onclick="goToTheJayaHome()">←</button>
        <div class="logo">Jaya Chats</div>
        <div style="width:24px;"></div>
    </header>

    <div class="app-body">
        <div class="chat-list-container" id="chat-list-feed">
            </div>

        <div class="chat-view-container" id="active-chat-window">
            <div class="chat-header">
                <div style="display:flex; align-items:center;">
                    <button class="back-btn" onclick="closeChatWindow()" style="margin-right:15px;">←</button>
                    <img src="" id="active-user-avatar" class="chat-avatar" style="width:36px; height:36px;">
                    <span id="active-user-title" class="chat-name"></span>
                </div>
                <div style="display:flex; gap:15px;">
                    <span onclick="initiateCall('Voice')" style="cursor:pointer; color:var(--primary);">📞</span>
                    <span onclick="initiateCall('Video')" style="cursor:pointer; color:var(--primary);">📹</span>
                </div>
            </div>
            
            <div class="messages-log" id="messages-container">
                </div>

            <div class="input-tray">
                <label for="media-input" style="cursor:pointer; font-size:22px; color:var(--primary);">📎</label>
                <input type="file" id="media-input" accept="image/*,video/*" style="display:none;" onchange="handleMediaUpload(this)">
                
                <textarea id="msg-text-input" placeholder="Type a message..."></textarea>
                <button class="btn" onclick="sendTextMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="fab-center" onclick="toggleSearchModal()">+</div>

    <div class="modal-overlay" id="search-modal">
        <div class="modal-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Find Users</h3>
                <span style="cursor:pointer; color:var(--red);" onclick="toggleSearchModal()">✕</span>
            </div>
            <input type="search" id="user-search-field" placeholder="Type username..." oninput="searchFirestoreUsers(this.value)">
            <div class="search-results" id="search-results-box">
                </div>
        </div>
    </div>

    <div class="context-menu" id="msg-context-menu">
        <div class="context-option" id="ctx-edit-opt" onclick="triggerEditMessage()">Edit Message (10m)</div>
        <div class="context-option" onclick="deleteMessage('me')">Delete for Me</div>
        <div class="context-option" onclick="deleteMessage('everyone')">Delete for Everyone</div>
    </div>

    <div class="call-screen" id="call-interface-layer">
        <div class="call-user-details">
            <img src="" id="call-screen-avatar" class="call-avatar">
            <h2 id="call-screen-name" style="margin-top:15px; margin-bottom:5px;"></h2>
            <div class="call-status-label" id="call-type-status">Jaya Voice Call...</div>
        </div>
        <div class="call-controls">
            <button class="call-btn-circle mute" onclick="this.classList.toggle('active')">Mute</button>
            <button class="call-btn-circle speaker" id="speaker-toggle" onclick="toggleSpeakerMode()">Speaker</button>
            <button class="call-btn-circle hangup" onclick="terminateCallSession()">Hang Up</button>
        </div>
    </div>

    <script>
        // --- STEP 1: Firebase Configuration Placeholder ---
        // The Jaya app ke same project credentials yahan enter karein.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase safely if not initialized globally
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- STEP 2: Session Check Logic ---
        // The Jaya app ke localStorage authentication context check rules
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        // Dev/Testing support fallback check pattern
        if(!currentUser && localStorage.getItem('username')) {
            currentUser = {
                username: localStorage.getItem('username'),
                hasRedTick: localStorage.getItem('hasRedTick') === 'true',
                profilePic: localStorage.getItem('profilePic') || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'
            };
        }

        // Agar check status verify nahi hota hai toh redirect and warnings process generate karein
        if (!currentUser) {
            alert("Aap pahle The Jaya app par login kariye!");
            // Replace ka use kiya hai taaki user back button daba kar stuck na ho - jhan jhat free!
            window.location.replace("index.html"); 
        } else {
            // Login wale user ke liye bina kisi rukawat ke Jaya Chats access
            console.log("Jaya Chats Authenticated for User:", currentUser.username);
        }

        // Globals Config tracking
        let currentActiveRoomId = null;
        let selectedTargetUser = null;
        let selectedMsgElementContextId = null;
        let activeCallSpeakerState = false;

        const redTickHTML = `<svg class="red-tick-svg" viewBox="0 0 24 24"><use href="#red-tick-icon"></use></svg>`;

        // On document fully prepared layout run listeners
        document.addEventListener("DOMContentLoaded", () => {
            if(currentUser) {
                loadChatFeedRooms();
            }
            
            // Listen for global outside click setups to close context option sheet elements
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.bubble')) {
                    document.getElementById('msg-context-menu').style.display = 'none';
                }
            });
        });

        function goToTheJayaHome() {
            window.location.href = "index.html";
        }

        function toggleSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            document.getElementById('user-search-field').value = '';
            document.getElementById('search-results-box').innerHTML = '';
        }

        // --- STEP 3: Firestore Database Search Engine Logic ---
        function searchFirestoreUsers(val) {
            const resultsBox = document.getElementById('search-results-box');
            if (!val.trim() || val.length < 2) {
                resultsBox.innerHTML = '';
                return;
            }

            const cleanQuery = val.toLowerCase().replace('@', '');

            // Firestore users table scan matching text ranges query pattern
            db.collection("users")
              .where("username", ">=", cleanQuery)
              .where("username", "<=", cleanQuery + "\uf8ff")
              .limit(8)
              .get()
              .then((snapshot) => {
                  resultsBox.innerHTML = '';
                  if(snapshot.empty) {
                      resultsBox.innerHTML = '<p style="font-size:13px; color:var(--text-muted);">No users found</p>';
                      return;
                  }

                  snapshot.forEach((doc) => {
                      const uData = doc.data();
                      // Self skip display validation rule check
                      if(uData.username === currentUser.username) return;

                      const tickDisplay = uData.hasRedTick ? redTickHTML : '';
                      const avatar = uData.profilePic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

                      const div = document.createElement('div');
                      div.className = 'search-user-item';
                      div.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${avatar}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                            <span style="font-weight:600;">@${uData.username}${tickDisplay}</span>
                        </div>
                        <button class="btn" onclick="initiateConnection('${uData.username}', '${avatar}', ${uData.hasRedTick || false})">Connect</button>
                      `;
                      resultsBox.appendChild(div);
                  });
              }).catch(err => console.error("Search failed: ", err));
        }

        // --- STEP 4: Creating Connections / Rooms Logic ---
        function initiateConnection(targetUsername, targetAvatar, targetHasTick) {
            // Uniquely structured sorting alphabetical identifiers for messaging session paths
            const sortedIds = [currentUser.username, targetUsername].sort();
            const roomId = `${sortedIds[0]}_${sortedIds[1]}`;

            // Create global room instance entry structure point
            db.collection("chat_rooms").doc(roomId).set({
                roomId: roomId,
                participants: [currentUser.username, targetUsername],
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                [`metadata.${currentUser.username}`]: { avatar: currentUser.profilePic, hasRedTick: currentUser.hasRedTick || false },
                [`metadata.${targetUsername}`]: { avatar: targetAvatar, hasRedTick: targetHasTick }
            }, { merge: true }).then(() => {
                toggleSearchModal();
                openChatWindow(roomId, targetUsername, targetAvatar, targetHasTick);
                loadChatFeedRooms();
            });
        }

        // --- STEP 5: Real-time Messaging Feed Rendering Engine ---
        function loadChatFeedRooms() {
            const feedBox = document.getElementById('chat-list-feed');
            
            db.collection("chat_rooms")
              .where("participants", "array-contains", currentUser.username)
              .onSnapshot((snapshot) => {
                  feedBox.innerHTML = '';
                  if (snapshot.empty) {
                      feedBox.innerHTML = '<p style="text-align:center; margin-top:40px; color:var(--text-muted);">No active connections. Click + to begin.</p>';
                      return;
                  }

                  snapshot.forEach((doc) => {
                      const room = doc.data();
                      const targetUser = room.participants.find(p => p !== currentUser.username);
                      
                      // Resolve data parameters safely from multi-user mapping structures
                      const meta = room[`metadata.${targetUser}`] || {};
                      const avatar = meta.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                      const tickDisplay = meta.hasRedTick ? redTickHTML : '';
                      const lastMsgText = room.lastMessage || 'Connected! Start chatting...';
                      
                      // Check for pending active unread indicator tags matching read state conditions
                      const isUnread = room.lastSender && room.lastSender !== currentUser.username && room.seenStatus !== true;

                      // Check configuration local filter states to preserve localized deletion tracking loops
                      const localDeletions = JSON.parse(localStorage.getItem(`deleted_room_${room.roomId}`)) || false;
                      if(localDeletions) return; 

                      const chatItem = document.createElement('div');
                      chatItem.className = 'chat-item';
                      chatItem.innerHTML = `
                          <img src="${avatar}" class="chat-avatar">
                          <div class="chat-info">
                              <span class="chat-name">@${targetUser}${tickDisplay}</span>
                              <span class="chat-last-msg">${lastMsgText}</span>
                          </div>
                          ${isUnread ? '<div class="unread-symbol"></div>' : ''}
                      `;
                      
                      chatItem.addEventListener('click', () => {
                          openChatWindow(room.roomId, targetUser, avatar, meta.hasRedTick || false);
                      });

                      feedBox.appendChild(chatItem);
                  });
              });
        }

        // --- STEP 6: Core Active Room View & Logic Handler ---
        function openChatWindow(roomId, targetUser, avatar, hasTick) {
            currentActiveRoomId = roomId;
            selectedTargetUser = { username: targetUser, avatar: avatar, hasRedTick: hasTick };

            document.getElementById('active-user-avatar').src = avatar;
            document.getElementById('active-user-title').innerHTML = `@${targetUser}${hasTick ? redTickHTML : ''}`;
            
            document.getElementById('active-chat-window').style.display = 'flex';

            // Mark incoming room logs state status fields inside Firestore to trigger read flags update immediately
            db.collection("chat_rooms").doc(roomId).update({
                seenStatus: true
            }).catch(() => {});

            // Load real-time dynamic streaming collection logs matching chat spaces criteria rules
            db.collection("chat_rooms").doc(roomId).collection("messages")
              .orderBy("timestamp", "asc")
              .onSnapshot((snapshot) => {
                  const container = document.getElementById('messages-container');
                  container.innerHTML = '';

                  snapshot.forEach((doc) => {
                      const msg = doc.data();
                      
                      // Verify localized tracking states map validation rules before output allocation flows
                      if (msg.deletedFor && msg.deletedFor.includes(currentUser.username)) return;

                      const isMe = msg.sender === currentUser.username;
                      const msgRow = document.createElement('div');
                      msgRow.className = `msg-row ${isMe ? 'sent' : 'received'}`;

                      let mediaContent = '';
                      if (msg.type === 'image') {
                          mediaContent = `
                            <img src="${msg.mediaUrl}" class="msg-media">
                            <a href="${msg.mediaUrl}" download="thejaya_${Date.now()}.jpg" class="download-btn" onclick="executeImageDownload(event, '${msg.mediaUrl}')">
                                📥 Download Image
                            </a>`;
                      } else if (msg.type === 'video') {
                          mediaContent = `<video src="${msg.mediaUrl}" controls class="msg-media"></video>`;
                      }

                      const timeFormatted = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                      const editBadge = msg.edited ? '<span class="edited-tag">(Edited)</span>' : '';
                      const readStatus = (isMe && msg.seen) ? '<span class="seen-status">Seen</span>' : '';

                      msgRow.innerHTML = `
                          <div class="bubble" data-id="${doc.id}" data-time="${msg.timestamp ? msg.timestamp.toMillis() : Date.now()}" data-sender="${msg.sender}">
                              ${msg.text ? `<div>${msg.text}</div>` : ''}
                              ${mediaContent}
                              <div class="msg-meta">
                                  <span>${timeFormatted}</span>
                                  ${editBadge}
                                  ${readStatus}
                              </div>
                          </div>
                      `;

                      // Context actions execution setup binder mapping arrays parameters list configuration sets
                      msgRow.querySelector('.bubble').addEventListener('contextmenu', (e) => {
                          e.preventDefault();
                          openContextMenuActions(e, doc.id, msg.timestamp ? msg.timestamp.toMillis() : Date.now(), msg.sender);
                      });
                      msgRow.querySelector('.bubble').addEventListener('click', (e) => {
                          // Mobile fallbacks support pattern loops mapping matching profiles
                          if(e.target.className !== 'download-btn') {
                             openContextMenuActions(e, doc.id, msg.timestamp ? msg.timestamp.toMillis() : Date.now(), msg.sender);
                          }
                      });

                      container.appendChild(msgRow);
                  });
                  container.scrollTop = container.scrollHeight;
              });

            // Auto status receipt marks database logs updates loop for current partner elements matching records maps
            db.collection("chat_rooms").doc(roomId).collection("messages")
              .where("sender", "==", targetUser)
              .get()
              .then(snap => {
                  snap.forEach(d => d.ref.update({ seen: true }));
              });
        }

        function closeChatWindow() {
            document.getElementById('active-chat-window').style.display = 'none';
            currentActiveRoomId = null;
        }

        // --- STEP 7: Text Messages Submission Trigger System ---
        function sendTextMessage() {
            const input = document.getElementById('msg-text-input');
            const text = input.value.trim();
            if (!text || !currentActiveRoomId) return;

            const msgData = {
                text: text,
                sender: currentUser.username,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                type: 'text',
                seen: false
            };

            db.collection("chat_rooms").doc(currentActiveRoomId).collection("messages").add(msgData);
            
            db.collection("chat_rooms").doc(currentActiveRoomId).update({
                lastMessage: text,
                lastSender: currentUser.username,
                seenStatus: false,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });

            input.value = '';
        }

        // --- STEP 8: Rich Media Content Management Logic (1MB Automatic Client Compression) ---
        function handleMediaUpload(inputElement) {
            const file = inputElement.files[0];
            if (!file || !currentActiveRoomId) return;

            // Image strict sizing validation matching compression scaling limits parameters routines
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Downsizing aspect algorithms mapping boundaries check loops criteria
                        const maxDimension = 1200;
                        if (width > maxDimension || height > maxDimension) {
                            if (width > height) {
                                height *= maxDimension / width;
                                width = maxDimension;
                            } else {
                                width *= maxDimension / height;
                                height = maxDimension;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Adaptive canvas encoding outputs evaluation loops balancing size directly below strict threshold target < 1MB
                        let quality = 0.85;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        
                        // Loop to force compress inside memory spaces without external network trips
                        while (dataUrl.length > 1000000 && quality > 0.3) {
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }

                        uploadMediaToFirestoreDoc(dataUrl, 'image');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                // Video processing fallbacks encoding structure map pipeline configurations elements sets tracker
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadMediaToFirestoreDoc(event.target.result, 'video');
                };
                reader.readAsDataURL(file);
            }
        }

        function uploadMediaToFirestoreDoc(base64Data, typeString) {
            const msgData = {
                mediaUrl: base64Data,
                sender: currentUser.username,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                type: typeString,
                seen: false
            };

            db.collection("chat_rooms").doc(currentActiveRoomId).collection("messages").add(msgData);
            db.collection("chat_rooms").doc(currentActiveRoomId).update({
                lastMessage: `📎 Shared a ${typeString}`,
                lastSender: currentUser.username,
                seenStatus: false,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Custom image dynamic download asset injector tracking target strings attributes
        function executeImageDownload(event, base64Url) {
            event.preventDefault();
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = base64Url;
            downloadAnchor.download = `thejaya_${Date.now()}.jpg`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
        }

        // --- STEP 9: Context Options Sheet Config Management Logic (Edit / Multi-Delete Route) ---
        function openContextMenuActions(event, msgId, timestampMillis, senderUsername) {
            selectedMsgElementContextId = msgId;
            const menu = document.getElementById('msg-context-menu');
            
            // Layout location calculation vectors processing mappings array sets positions rules maps profiles definitions variables fields
            menu.style.top = `${event.clientY || event.touches[0].clientY}px`;
            menu.style.left = `${event.clientX || event.touches[0].clientX}px`;
            menu.style.display = 'block';

            const editOption = document.getElementById('ctx-edit-opt');
            const timeDifference = Date.now() - timestampMillis;
            const tenMinutesLimit = 10 * 60 * 1000;

            // Visibility rules matching ownership profiles verification configurations arrays parameters structures sets items
            if (senderUsername === currentUser.username && timeDifference < tenMinutesLimit) {
                editOption.style.display = 'block';
            } else {
                editOption.style.display = 'none';
            }
        }

        function triggerEditMessage() {
            document.getElementById('msg-context-menu').style.display = 'none';
            const newText = prompt("Edit your message:");
            if (!newText || !newText.trim() || !currentActiveRoomId || !selectedMsgElementContextId) return;

            db.collection("chat_rooms").doc(currentActiveRoomId)
              .collection("messages").doc(selectedMsgElementContextId).update({
                  text: newText,
                  edited: true
              });
        }

        function deleteMessage(mode) {
            document.getElementById('msg-context-menu').style.display = 'none';
            if (!currentActiveRoomId || !selectedMsgElementContextId) return;

            if (mode === 'me') {
                // Delete for me setup uses local flag markers tracking list paths elements logic array mapping parameters
                db.collection("chat_rooms").doc(currentActiveRoomId)
                  .collection("messages").doc(selectedMsgElementContextId).update({
                      deletedFor: firebase.firestore.FieldValue.arrayUnion(currentUser.username)
                  });
            } else if (mode === 'everyone') {
                // Completely erase or invalidate text payload data fields globally across interfaces arrays bounds parameters tracking loop maps definitions logs
                db.collection("chat_rooms").doc(currentActiveRoomId)
                  .collection("messages").doc(selectedMsgElementContextId).delete();
            }
        }

        // --- STEP 10: Call Interfacing Simulation UI Logic Layer ---
        function initiateCall(type) {
            if (!selectedTargetUser) return;
            document.getElementById('call-screen-avatar').src = selectedTargetUser.avatar;
            document.getElementById('call-screen-name').innerText = `@${selectedTargetUser.username}`;
            document.getElementById('call-type-status').innerText = `Jaya ${type} Call...`;
            
            // Set initial state for speaker action controls elements structures mapping indicators values fields parameters setup items logs
            activeCallSpeakerState = false;
            document.getElementById('speaker-toggle').classList.remove('active');

            document.getElementById('call-interface-layer').style.display = 'flex';
        }

        function toggleSpeakerMode() {
            activeCallSpeakerState = !activeCallSpeakerState;
            const speakerBtn = document.getElementById('speaker-toggle');
            if (activeCallSpeakerState) {
                speakerBtn.classList.add('active');
            } else {
                speakerBtn.classList.remove('active');
            }
        }

        function terminateCallSession() {
            document.getElementById('call-interface-layer').style.display = 'none';
        }
    </script>
</body>
