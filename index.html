<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saga Twitte</title>
    <style>
        :root { --primary: #00acee; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --white: #ffffff; --star: #fbbf24; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: var(--card); backdrop-filter: blur(12px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); cursor: pointer; }

        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; position: relative; }
        
        input, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; box-sizing: border-box; outline: none; }
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }

        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; box-shadow: 0 8px 25px rgba(0,172,238,0.5); z-index: 2000; cursor: pointer; }
        
        .p-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-time { font-size: 11px; color: #94a3b8; display: block; margin-top: -5px; margin-bottom: 10px; }
        
        .action-bar { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; margin-top: 12px; }
        .action-btn { background: transparent; color: #94a3b8; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .comment-drawer { display: none; margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 12px; }
        .comment-msg { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: rgba(0, 172, 238, 0.1); padding: 15px; border-radius: 18px; border: 1px solid var(--primary); text-align: center; }
        .stat-val { display: block; font-size: 26px; font-weight: 800; color: var(--primary); }
        
        .close-btn { cursor: pointer; font-size: 22px; opacity: 0.8; padding: 5px; }
        #search-row { display: none; padding: 10px; background: var(--bg); border-bottom: 1px solid var(--primary); }

        /* Naya Style Logo ke liye */
        .footer-branding { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; pointer-events: none; }
        .footer-branding p { font-size: 12px; color: rgba(255,255,255,0.4); margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .footer-logo { font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.6); margin-top: 2px; }
    </style>
</head>
<body>

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">Saga Twitte</h1>
        <button id="googleLogin" style="background:#fff; color:#000; padding:15px 30px; margin-top:20px;">Login with Google</button>
           <div style="position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; opacity: 0.8;">
        <img src="https://i.ibb.co/Kxdbgc6D/Dofoto-20260430-133314752.png" alt="Saga Logo" style="width: 80px; filter: grayscale(1) brightness(2);">
    </div>

    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo" onclick="navTo('home')">Saga Twitte</div>
            <div style="display:flex; align-items:center; gap:15px;">
                <span onclick="toggleSearch()" style="cursor:pointer; font-size:20px;">🔍</span>
                <img id="head-pic" class="p-pic" onclick="navTo('profile', true)" style="cursor:pointer; border:2px solid var(--primary);">
            </div>
        </header>

        <div id="search-row">
            <div style="display:flex; gap:10px;">
                <input type="text" id="sq" placeholder="Search @username...">
                <button onclick="findUser()" style="background:var(--primary); color:white;">Go</button>
            </div>
        </div>

        <div class="container">
            <div id="home-view"><div id="feed"></div></div>

            <div id="profile-view" style="display:none;" class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <span class="close-btn" onclick="navTo('home')">✕</span>
                    <span style="font-weight:bold; color:var(--primary);">Profile</span>
                    <div style="width:24px;"></div>
                </div>
                <div style="text-align:center;">
                    <img id="u-img" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                    <h2 id="u-name" style="margin:10px 0;">@username</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><span id="s-stars" class="stat-val">0</span><small>Stars</small></div>
                        <div class="stat-card"><span id="s-posts" class="stat-val">0</span><small>Posts</small></div>
                    </div>
                    <div id="my-controls" style="display:none;">
                        <button onclick="checkEditUsername()" style="background:rgba(255,255,255,0.1); color:white; width:100%; margin-bottom:10px;">Edit Username</button>
                        <p id="lock-timer" style="font-size:10px; color:var(--red);"></p>
                        <button onclick="logout()" style="background:var(--red); color:white; width:100%;">Logout Account</button>
                    </div>
                </div>
                <hr style="opacity:0.1; margin:20px 0;">
                <div id="u-feed"></div>
            </div>
        </div>

        <div id="fab-btn" class="fab" onclick="setPostModal(true)">+</div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <span onclick="setPostModal(false)" style="float:right; cursor:pointer;">✕</span>
            <h3 style="margin:0 0 15px 0;">Create Post</h3>
            <textarea id="postInput" rows="5" placeholder="Kya chal raha hai?"></textarea>
            <button class="btn-primary" onclick="doPost()" style="margin-top:15px;">Post Now</button>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, deleteDoc, getDoc, setDoc, where, getDocs, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { apiKey: "AIzaSyC2DSzlGsl5y3NwgOpgIOC-1OUYyKEaZ5k", authDomain: "saga-social-a13a4.firebaseapp.com", projectId: "saga-social-a13a4", storageBucket: "saga-social-a13a4.appspot.com" };
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProv = new GoogleAuthProvider();
        let me = null;

        const timeAgo = (t) => {
            const d = Date.now() - t, m = Math.floor(d/60000), h = Math.floor(m/60), day = Math.floor(h/24);
            if(m < 1) return "Just now"; if(m < 60) return m+"m ago"; if(h < 24) return h+"h ago"; return day+"d ago";
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const dSnap = await getDoc(doc(db, "users", u.uid));
                if(!dSnap.exists()) {
                    const un = u.displayName.replace(/\s+/g,'').toLowerCase() + Math.floor(Math.random()*99);
                    await setDoc(doc(db, "users", u.uid), { username: un, uid: u.uid, pic: u.photoURL, lastChange: Date.now() });
                    location.reload();
                } else {
                    me = dSnap.data();
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('auth-section').style.display = 'none';
                    navTo('home');
                }
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        window.navTo = (v, isMe = true, other = null) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            document.getElementById('head-pic').src = auth.currentUser.photoURL;
            if(v === 'home') loadFeed("feed", null);
            if(v === 'profile') {
                const user = isMe ? me : other;
                document.getElementById('u-img').src = user.pic;
                document.getElementById('u-name').innerText = "@" + user.username;
                document.getElementById('my-controls').style.display = isMe ? 'block' : 'none';
                loadFeed("u-feed", user.uid);
            }
        };

        function loadFeed(divId, uid) {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), where("time", ">=", Date.now()-(7*86400000)), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";
                let stars = 0, posts = 0;
                s.forEach(d => {
                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }
                    const isStarred = p.stars?.includes(auth.currentUser.uid);
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${p.pic}" class="p-pic">
                            <strong onclick="findUserByUname('${p.username}')" style="cursor:pointer;">@${p.username}</strong>
                            ${auth.currentUser.uid === p.uid ? `<span onclick="delPost('${d.id}')" style="margin-left:auto; cursor:pointer;">🗑️</span>` : ''}
                        </div>
                        <span class="post-time">${timeAgo(p.time)}</span>
                        <p>${p.text}</p>
                        <div class="action-bar">
                            <span class="action-btn" onclick="starIt('${d.id}', ${isStarred})" style="color:${isStarred?'var(--star)':''}">⭐ ${p.stars?.length || 0}</span>
                            <span class="action-btn" onclick="toggleComs('${d.id}')">💬 ${p.comments?.length || 0}</span>
                            <span class="action-btn" onclick="sharePost('${p.text}')">🔗 Share</span>
                        </div>
                        <div id="drawer-${d.id}" class="comment-drawer">
                            <div id="list-${d.id}">${(p.comments || []).map((c, i) => `
                                <div class="comment-msg">
                                    <span><b>@${c.user}</b>: ${c.msg}</span>
                                    ${(auth.currentUser.uid === c.uid || auth.currentUser.uid === p.uid) ? `<small onclick="delCom('${d.id}', ${i})" style="color:var(--red); cursor:pointer; font-weight:bold; margin-left:10px;">Del</small>` : ''}
                                </div>`).join('')}</div>
                            <div style="display:flex; gap:5px; margin-top:10px;">
                                <input id="in-${d.id}" placeholder="Reply...">
                                <button onclick="addCom('${d.id}')" style="background:var(--primary); font-size:10px; color:white;">Send</button>
                            </div>
                        </div>
                    `;
                    div.appendChild(el);
                });
                if(uid) { document.getElementById('s-stars').innerText = stars; document.getElementById('s-posts').innerText = posts; }
            });
        }

        window.checkEditUsername = async () => {
            const now = Date.now();
            const diff = now - me.lastChange;
            const daysLeft = 7 - Math.floor(diff/(1000*60*60*24));
            if(diff < 7*24*60*60*1000) {
                document.getElementById('lock-timer').innerText = `Wait ${daysLeft} more days!`;
                return;
            }
            const newU = prompt("Enter new username:").toLowerCase().replace(/\s+/g,'');
            if(newU) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newU, lastChange: now });
                location.reload();
            }
        };

        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { text: t, username: me.username, pic: auth.currentUser.photoURL, uid: auth.currentUser.uid, stars: [], comments: [], time: Date.now() });
            document.getElementById('postInput').value = ""; setPostModal(false);
        };

        window.starIt = async (id, has) => { await updateDoc(doc(db, "posts", id), { stars: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); };
        window.addCom = async (id) => {
            const i = document.getElementById('in-'+id);
            if(!i.value.trim()) return;
            await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, user: me.username, msg: i.value }) });
            i.value = "";
        };
        window.delCom = async (pid, idx) => {
            const r = doc(db, "posts", pid); const s = await getDoc(r);
            let c = s.data().comments; c.splice(idx, 1);
            await updateDoc(r, { comments: c });
        };
        window.findUser = async () => {
            const qStr = document.getElementById('sq').value.toLowerCase().trim();
            const s = await getDocs(query(collection(db, "users"), where("username", "==", qStr)));
            if(s.empty) alert("No user!"); else navTo('profile', false, s.docs[0].data());
        };
        window.findUserByUname = async (un) => {
            const s = await getDocs(query(collection(db, "users"), where("username", "==", un)));
            navTo('profile', false, s.docs[0].data());
        };
        window.delPost = async (id) => { if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id)); };
        window.toggleSearch = () => { const r = document.getElementById('search-row'); r.style.display = r.style.display === 'block'?'none':'block'; };
        window.toggleComs = (id) => { const d = document.getElementById('drawer-'+id); d.style.display = d.style.display === 'block'?'none':'block'; };
        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        window.sharePost = (t) => navigator.share({ title: 'Saga Twitte', text: t, url: location.href });
        window.logout = () => signOut(auth);
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, gProv);
    </script>
</body>
</html>
