<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" href="logo.jpg?v=1.1">
    <link rel="shortcut icon" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">

     <style>
        /* --- DESKTOP OPTIMIZATION --- */
        @media (min-width: 768px) {
            .container { max-width: 700px; margin: 30px auto; }
            header { padding: 15px 10%; }
            .logo { font-size: 28px; }
            .card { padding: 25px; border-radius: 24px; transition: transform 0.2s ease; }
            .card:hover { border-color: var(--primary); }
            input, textarea { font-size: 16px; }
            .fab { right: 50px; bottom: 50px; width: 70px; height: 70px; }
            .p-pic { width: 50px; height: 50px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
            #post-modal .container { max-width: 600px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--primary); }

        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --star: #ffd700; 
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        /* --- LIGHT MODE THEME --- */
        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary: #008ad3;
            --neon-shadow: 0 4px 12px rgba(0, 138, 211, 0.2);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 100px; 
            overflow-x: hidden; 
            transition: background 0.3s ease;
        }

        #loader-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0, 229, 255, 0.1);
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; text-shadow: var(--neon-shadow); }
        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.1); 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        input, textarea { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
        }
        
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; box-shadow: var(--neon-shadow); }

        .fab { 
            position: fixed; bottom: 35px; right: 25px; 
            width: 60px; height: 60px; 
            background: var(--primary); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; 
            box-shadow: var(--neon-shadow); 
            z-index: 2000; cursor: pointer; 
        }

        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; justify-content: center; }
        .post-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .action-bar { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; }
        .action-btn { background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        
        svg { width: 20px; height: 20px; fill: currentColor; }
        .del-icon { width: 18px; height: 18px; fill: var(--red); opacity: 0.7; transition: 0.3s; }
        .del-icon:hover { opacity: 1; }

        .comment-drawer { display: none; margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-card { background: rgba(0, 229, 255, 0.05); padding: 15px; border-radius: 18px; border: 1px solid var(--primary); text-align: center; }
        .stat-val { display: block; font-size: 28px; font-weight: 800; color: var(--primary); }
        #search-row { display: none; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--primary); }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
            width: 100%;
            margin-bottom: 10px;
            border: 1px solid var(--primary);
        }
    </style>
</head>
<body>

    <div id="loader-screen">
    <div class="loader-visual">
        <div class="planet"></div>
        <div class="orbit">
            <div class="satellite"></div>
        </div>
    </div>
    <div class="loading-text">
        <h1 class="logo">The Jaya</h1>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<style>
    /* --- NEW WORLD-DIFFERENT LOADER CSS --- */
    #loader-screen {
        position: fixed; inset: 0; background: #030a1a; /* Darkest Space Blue */
        display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }

    .loader-visual {
        position: relative; width: 120px; height: 120px;
        display: flex; align-items: center; justify-content: center; margin-bottom: 30px;
    }

    /* Central Glowing Planet */
    .planet {
        width: 40px; height: 40px; background: var(--primary);
        border-radius: 50%; box-shadow: 0 0 40px var(--primary), inset 0 0 15px rgba(255,255,255,0.8);
        animation: pulse 2s ease-in-out infinite;
    }

    /* Rotating Orbit Ring */
    .orbit {
        position: absolute; width: 100px; height: 100px;
        border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 50%;
        animation: spin 3s linear infinite;
    }

    

    .loading-text { text-align: center; }
    
    .loading-text .logo {
        font-size: 32px; letter-spacing: 5px; margin: 0;
        background: linear-gradient(90deg, #fff, var(--primary), #fff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-size: 200%; animation: shine 3s linear infinite;
    }

    /* Subtle Progress Bar */
    .progress-bar {
        width: 150px; height: 2px; background: rgba(255,255,255,0.1);
        margin-top: 15px; border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
        width: 0%; height: 100%; background: var(--primary);
        animation: loadFill 2.5s ease-in-out forwards;
    }

    /* ANIMATIONS */
    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes shine { 100% { background-position: 200%; } }
    @keyframes loadFill { 0% { width: 0%; } 100% { width: 100%; } }
    
</style>
    

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">The Jaya</h1>
        <button id="googleLogin" class="btn-primary" style="background:#fff; color:#000; width:auto; padding:15px 40px; margin-top:30px;">Login with Google</button>
        <p id="guest-trigger" style="color:var(--primary); margin-top:20px; cursor:pointer; text-decoration:underline;">Continue as Guest</p>
        <div style="position: absolute; bottom: 40px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; opacity: 0.8;">
            <img src="https://i.ibb.co/Kxdbgc6D/Dofoto-20260430-133314752.png" alt="ree" style="width: 80px; filter: brightness(2);">
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo" onclick="navTo('home')">The Jaya</div>
            <div style="display:flex; align-items:center; gap:18px;">
                <span onclick="requireLogin(toggleSearch)" style="cursor:pointer; display: flex; color: var(--text-muted);">
                    <svg viewBox="0 0 24 24"><path d="M21.71 20.29l-1.42 1.42a1 1 0 01-1.42 0l-4.52-4.52A7.89 7.89 0 019 19a8 8 0 118-8 7.89 7.89 0 01-1.81 4.35l4.52 4.52a1 1 0 010 1.42zM4 11a7 7 0 1014 0 7 7 0 00-14 0z"/></svg>
                </span>
                <img id="head-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="p-pic" onclick="requireLogin(() => navTo('profile', true))" style="cursor:pointer; border:2px solid var(--primary);">
            </div>
        </header>

        <div id="search-row">
            <div style="display:flex; gap:10px;">
                <input type="text" id="sq" placeholder="Search @username...">
                <button onclick="findUser()" class="btn-primary" style="width: auto;">Go</button>
            </div>
        </div>

        <div class="container">
            <div id="home-view"><div id="feed"></div></div>
            <div id="profile-view" style="display:none;" class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <span onclick="navTo('home')" style="cursor:pointer; font-size: 24px;">✕</span>
                    <span style="font-weight:bold; color:var(--primary);">Profile</span>
                    <div style="width:24px;"></div>
                </div>
                <div style="text-align:center;">
                    <img id="u-img" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                    <h2 id="u-name" style="margin:15px 0;">@username</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><span id="s-stars" class="stat-val">0</span><small>Stars</small></div>
                        <div class="stat-card"><span id="s-posts" class="stat-val">0</span><small>Posts</small></div>
                    </div>
                    <div id="my-controls" style="display:none;">
                        <button onclick="toggleTheme()" class="theme-toggle">Toggle Light/Dark Mode</button>
                        <button onclick="checkEditUsername()" style="background:rgba(255,255,255,0.1); color:var(--text-main); width:100%; margin-bottom:10px; border:1px solid rgba(255,255,255,0.2);">Edit Username</button>
                        <p id="lock-timer" style="font-size:11px; color:var(--red);"></p>
                        <button onclick="logout()" style="background:var(--red); color:white; width:100%;">Logout</button>
                    </div>
                </div>
                <div id="u-feed"></div>
            </div>
        </div>

        <div id="fab-btn" class="fab" onclick="requireLogin(() => setPostModal(true))">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <h3 style="margin:0 0 20px 0;">New Post</h3>
            <textarea id="postInput" rows="5" placeholder="What's happening?"></textarea>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-primary" onclick="doPost()">Post Now</button>
                <button onclick="setPostModal(false)" style="background:rgba(255,255,255,0.1); color:var(--text-main);">Cancel</button>
            </div>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, deleteDoc, getDoc, setDoc, where, getDocs, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const conf = { 
            apiKey: "AIzaSyC2DSzlGsl5y3NwgOpgIOC-1OUYyKEaZ5k", 
            authDomain: "saga-social-a13a4.firebaseapp.com", 
            projectId: "saga-social-a13a4", 
            storageBucket: "saga-social-a13a4.appspot.com" 
        };
        
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProv = new GoogleAuthProvider();
        let me = null;

        // 3 SECONDS LOADER TIMER
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
            }, 3000);
        });

        // THEME LOGIC (Dark/Light Mode)
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        // HELPER: Time Ago formatter
        const timeAgo = (t) => {
            const d = Date.now() - t, m = Math.floor(d/60000), h = Math.floor(m/60), day = Math.floor(h/24);
            if(m < 1) return "Just now"; if(m < 60) return m+"m ago"; if(h < 24) return h+"h ago"; return day+"d ago";
        };

        // Icons
        const iconStar = '<svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>';
        const iconComment = '<svg viewBox="0 0 24 24"><path d="M9 22a1 1 0 01-1-1v-3H4a2 2 0 01-2-2V4a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-4.9l-3.4 3.7a1 1 0 01-.7.3zm-5-6h5a1 1 0 011 1v2.3l2.5-2.7a1 1 0 01.8-.3H20V4H4z"/></svg>';
        const iconShare = '<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>';
        const iconDelete = '<svg class="del-icon" viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>';

        // Auth Listener
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const dSnap = await getDoc(doc(db, "users", u.uid));
                if(!dSnap.exists()) {
                    const un = u.displayName.replace(/\s+/g,'').toLowerCase() + Math.floor(Math.random()*99);
                    await setDoc(doc(db, "users", u.uid), { username: un, uid: u.uid, pic: u.photoURL, lastChange: Date.now() });
                    location.reload();
                } else {
                    me = dSnap.data();
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('auth-section').style.display = 'none';
                    navTo('home');
                }
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // Guest Login Feature
        window.showGuestFeed = () => {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadFeed("feed", null);
        };
        document.getElementById('guest-trigger').onclick = showGuestFeed;

        // Login Check Wrapper
        window.requireLogin = (cb) => {
            if(!auth.currentUser) {
                alert("Please login first!");
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('auth-section').style.display = 'block';
            } else cb();
        };

        // Navigation
        window.navTo = (v, isMe = true, other = null) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            if(auth.currentUser) document.getElementById('head-pic').src = auth.currentUser.photoURL;
            if(v === 'home') loadFeed("feed", null);
            if(v === 'profile') {
                const user = isMe ? me : other;
                document.getElementById('u-img').src = user.pic;
                document.getElementById('u-name').innerText = "@" + user.username;
                document.getElementById('my-controls').style.display = isMe ? 'block' : 'none';
                loadFeed("u-feed", user.uid);
            }
        };

        // Load Posts Feed
        function loadFeed(divId, uid) {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";
                let stars = 0, posts = 0;
                s.forEach(d => {
                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }
                    const isStarred = auth.currentUser ? p.stars?.includes(auth.currentUser.uid) : false;
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${p.pic}" class="p-pic">
                            <div class="user-info">
                                <strong onclick="requireLogin(() => findUserByUname('${p.username}'))" style="cursor:pointer;">@${p.username}</strong>
                                <span class="post-time">${timeAgo(p.time)}</span>
                            </div>
                            ${(auth.currentUser && auth.currentUser.uid === p.uid) ? `<div onclick="delPost('${d.id}')" style="margin-left:auto; cursor:pointer;">${iconDelete}</div>` : ''}
                        </div>
                        <p style="margin: 0; line-height:1.5;">${p.text}</p>
                        <div class="action-bar">
                            <span class="action-btn" onclick="starIt('${d.id}', ${isStarred})" style="color:${isStarred?'var(--star)':''}">
                                ${iconStar} ${p.stars?.length || 0}
                            </span>
                            <span class="action-btn" onclick="requireLogin(() => toggleComs('${d.id}'))">
                                ${iconComment} ${p.comments?.length || 0}
                            </span>
                            <span class="action-btn" onclick="sharePost('${p.text.replace(/'/g, "\\'")}')">
                                ${iconShare} Share
                            </span>
                        </div>
                        <div id="drawer-${d.id}" class="comment-drawer">
                            <div id="list-${d.id}">${(p.comments || []).map((c, i) => `
                                <div style="margin-bottom:8px; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
                                    <span><b style="color:var(--primary)">@${c.user}</b>: ${c.msg}</span>
                                    ${(auth.currentUser && (auth.currentUser.uid === c.uid || auth.currentUser.uid === p.uid)) ? `<div onclick="delCom('${d.id}', ${i})" style="cursor:pointer;">${iconDelete}</div>` : ''}
                                </div>`).join('')}</div>
                            <div style="display:flex; gap:8px; margin-top:15px;">
                                <input id="in-${d.id}" placeholder="Reply...">
                                <button onclick="addCom('${d.id}')" class="btn-primary" style="width:auto;">Send</button>
                            </div>
                        </div>
                    `;
                    div.appendChild(el);
                });
                if(uid) { document.getElementById('s-stars').innerText = stars; document.getElementById('s-posts').innerText = posts; }
            });
        }

        // Action: Like/Star
        window.starIt = async (id, has) => { 
            if(!auth.currentUser) {
                alert("Please login first!");
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('auth-section').style.display = 'block';
                return;
            }
            await updateDoc(doc(db, "posts", id), { stars: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); 
        };

        // Action: Edit Username
        window.checkEditUsername = async () => {
            const now = Date.now();
            const diff = now - me.lastChange;
            if(diff < 7*24*60*60*1000) { alert("Please wait 7 days!"); return; }
            const newU = prompt("New username:").toLowerCase().replace(/\s+/g,'');
            if(newU) { await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newU, lastChange: now }); location.reload(); }
        };

        // Action: Create Post
        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { text: t, username: me.username, pic: auth.currentUser.photoURL, uid: auth.currentUser.uid, stars: [], comments: [], time: Date.now() });
            document.getElementById('postInput').value = ""; setPostModal(false);
        };

        // Action: Add Comment
        window.addCom = async (id) => {
            const i = document.getElementById('in-'+id);
            if(!i.value.trim()) return;
            await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, user: me.username, msg: i.value }) });
            i.value = "";
        };

        // Action: Delete Comment
        window.delCom = async (pid, idx) => {
            const r = doc(db, "posts", pid); const s = await getDoc(r);
            let c = s.data().comments; c.splice(idx, 1);
            await updateDoc(r, { comments: c });
        };

        // Action: Search User
        window.findUser = async () => {
            const qStr = document.getElementById('sq').value.toLowerCase().trim();
            const s = await getDocs(query(collection(db, "users"), where("username", "==", qStr)));
            if(s.empty) alert("No user found!"); else navTo('profile', false, s.docs[0].data());
        };

        window.findUserByUname = async (un) => {
            const s = await getDocs(query(collection(db, "users"), where("username", "==", un)));
            if(!s.empty) navTo('profile', false, s.docs[0].data());
        };

        // Utilities
        window.delPost = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };
        window.toggleSearch = () => { const r = document.getElementById('search-row'); r.style.display = r.style.display === 'block'?'none':'block'; };
        window.toggleComs = (id) => { const d = document.getElementById('drawer-'+id); d.style.display = d.style.display === 'block'?'none':'block'; };
        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        window.sharePost = (t) => navigator.share({ title: 'Jaya', text: t, url: location.href });
        window.logout = () => { signOut(auth); location.reload(); };
        
        // Auth Trigger
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, gProv);
    </script>
</body>
</html>
