        body {

            justify-content: space-between; 
            align-items: center;

        .container { width: 95%; max-width: 500px; margin: 15px auto; }

            word-break: break-word;
            white-space: pre-wrap;
        }

            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
            margin-bottom: 10px;
        }
        
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; box-shadow: var(--neon-shadow); }

        .fab { 
            position: fixed; bottom: 35px; right: 25px; 
            width: 60px; height: 60px; 
            background: var(--primary); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; 
            box-shadow: var(--neon-shadow); 
            z-index: 2000; cursor: pointer; 
        }

        .bits-btn {
            position: fixed;
            bottom: 110px;
            right: 32px;
            width: 45px;
            height: 45px;
            background: var(--card-bg);
            border: 1px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: var(--neon-shadow);

            font-size: 12px;
            font-weight: bold;
            text-decoration: none;

            left: 25px;

            height: 50px;

            justify-content: center;
            color: var(--primary);

            cursor: pointer;

        #search-row { display: none; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--primary); }

            color: var(--text-main);

            margin-bottom: 10px;
            border: 1px solid var(--primary);

        #loader-screen {
            position: fixed; inset: 0; background: #030a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .loader-visual { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes shine { 100% { background-position: 200%; } }
        @keyframes loadFill { 0% { width: 0%; } 100% { width: 100%; } }

        #custom-install-btn {
            display: none;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin-right: 10px;
            box-shadow: var(--neon-shadow);
        }

        /* Tabs UI Style */
        .auth-card { max-width: 360px; margin: auto; padding: 20px; border-radius: 20px; background: var(--card-bg); border: 1px solid rgba(0, 229, 255, 0.2); }

        .floating-bot {

            bottom: 170px;
            right: 32px;
            width: 45px;
            height: 45px;

            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.9);
        }
        .floating-bot svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }

        /* Customization UI Modal System Overlay Style rendering */
        #customizer-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(3, 10, 26, 0.95);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .customizer-content {
            background: rgba(6, 17, 39, 0.9);

            border-radius: 24px;

            padding: 25px;

        }
        .customizer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 10px;
        }
        .customizer-title {
            font-size: 20px;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }
        .customizer-close {
            font-size: 24px;
            cursor: pointer;
            color: #8a99b3;
            transition: 0.3s;
        }
        .customizer-close:hover {
            color: #ff4444;
        }
        .control-group {
            margin-bottom: 18px;
        }
        .control-label {
            display: block;
            font-size: 14px;
            color: #8a99b3;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .customizer-btn {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 10px 15px;
            border-radius: 12px;

        }
        .customizer-btn:hover {
            background: #00e5ff;
            color: #030a1a;

        .range-slider {
            width: 100%;
            -webkit-appearance: none;

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;

            height: 18px;
            border-radius: 50%;

            box-shadow: 0 0 8px rgba(0, 229, 255, 0.8);
        }
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
        .blur-filter-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transition: backdrop-filter 0.3s, -webkit-backdrop-filter 0.3s;
        }
    </style>

        // Dynamic Interactive Canvas Engine Logic
        const canvas = document.getElementById('bubbleCanvas');

        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class BubbleParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.radius = Math.random() * 4 + 1;
                this.y = canvas.height + Math.random() * 20;
                this.speedY = -(Math.random() * 0.8 + 0.4) * config.speed;
                this.speedX = (Math.random() * 0.4 - 0.2) * config.speed;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = config.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = config.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function initCanvasEngine() {
            particles = [];
            for (let i = 0; i < config.count; i++) {
                particles.push(new BubbleParticle());
            }
        }

        function animateCanvasEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateCanvasEngine);
        }

        // Live Customizer Global Controller Methods
        window.openCustomizer = () => {

            if (theme === 'crimson') targetHex = '#ff1744';
            
            config.color = targetHex;
            localStorage.setItem('fx_color', targetHex);
            initCanvasEngine();
        };

        window.updateFxConfigs = () => {
            const countVal = parseInt(document.getElementById('cfg-count').value);
            const speedVal = parseInt(document.getElementById('cfg-speed').value) / 10;
            const blurVal = parseInt(document.getElementById('cfg-blur').value);

            document.getElementById('lbl-count').innerText = `Aura Particle Density: ${countVal}`;
            document.getElementById('lbl-speed').innerText = `Kinetic Drift Speed: ${speedVal.toFixed(1)}x`;
            document.getElementById('lbl-blur').innerText = `Backdrop Frost Filter: ${blurVal}px`;

            config.count = countVal;
            config.speed = speedVal;
            config.blur = blurVal;

            document.getElementById('blurLayer').style.backdropFilter = `blur(${blurVal}px)`;
            document.getElementById('blurLayer').style.webkitBackdropFilter = `blur(${blurVal}px)`;

            localStorage.setItem('fx_count', countVal);
            localStorage.setItem('fx_speed', speedVal);
            localStorage.setItem('fx_blur', blurVal);

            initCanvasEngine();
        };

        window.resetFxConfigs = () => {
            document.getElementById('cfg-count').value = 45;
            document.getElementById('cfg-speed').value = 12;
            document.getElementById('cfg-blur').value = 0;
            
            config.color = '#00e5ff';
            localStorage.removeItem('fx_color');
            localStorage.removeItem('fx_count');
            localStorage.removeItem('fx_speed');
            localStorage.removeItem('fx_blur');

            updateFxConfigs();
        };

        // Cache parameters restore procedure loading runtime sequence
        if (localStorage.getItem('fx_color')) config.color = localStorage.getItem('fx_color');

            config.count = parseInt(localStorage.getItem('fx_count'));
            document.getElementById('cfg-count').value = config.count;
        }
        if (localStorage.getItem('fx_speed')) {
            config.speed = parseFloat(localStorage.getItem('fx_speed'));
            document.getElementById('cfg-speed').value = Math.round(config.speed * 10);
        }
        if (localStorage.getItem('fx_blur')) {
            config.blur = parseInt(localStorage.getItem('fx_blur'));
            document.getElementById('cfg-blur').value = config.blur;
            document.getElementById('blurLayer').style.backdropFilter = `blur(${config.blur}px)`;
            document.getElementById('blurLayer').style.webkitBackdropFilter = `blur(${config.blur}px)`;

        // Initialize and launch rendering loops
        initCanvasEngine();

            if(m < 1) return "Just now"; if(m < 60) return m+"m ago"; if(h < 24) return h+"h ago"; return day+"d ago";
        };

        const iconStar = '<svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>';
        const iconComment = '<svg viewBox="0 0 24 24"><path d="M9 22a1 1 0 01-1-1v-3H4a2 2 0 01-2-2V4a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-4.9l-3.4 3.7a1 1 0 01-.7.3zm-5-6h5a1 1 0 011 1v2.3l2.5-2.7a1 1 0 01.8-.3H20V4H4z"/></svg>';
        const iconShare = '<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>';
        const iconDelete = '<svg class="del-icon" viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>';

        onAuthStateChanged(auth, async (u) => {
            if(u) {

        // Interface Toggle Router Functions

        // Form Submission Router Sequence with Safe Data Cleansing
        window.handleAuthSubmit = async (event, mode) => {
            event.preventDefault();
            
            let uname = "", pass = "", email = "";

                uname = document.getElementById('login-username').value;
                pass = document.getElementById('login-pass').value.trim();

                uname = document.getElementById('signup-username').value;
                email = document.getElementById('signup-email').value.trim();
                pass = document.getElementById('signup-pass').value.trim();
            }

            if(mode === 'login') {
                if(!uname || !pass || uname.trim() === "") {
                    alert("Please fill all fields!");

                uname = uname.toLowerCase().replace(/[^a-z0-9]/g, '').trim();

                try {

                        alert("Invalid Username or Password!");

                        alert("Error: " + err.message);

            } else {
                if(!uname || !pass || !email || uname.trim() === "") {
                    alert("Please fill all fields!");
                    return;
                }
                uname = uname.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
                if(uname.length < 3) {
                    alert("Username must be at least 3 valid alphanumeric characters!");

        function loadFeed(divId, uid) {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";

                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }

        const wordCountDisplay = document.getElementById('word-count');
        const WORD_LIMIT = 110;

        const updateWordCount = () => {
            const val = postInput.value;
            const words = val.match(/\S+/g) || []; 
            if (words.length > WORD_LIMIT) {
                const trimmedText = val.split(/\s+/).slice(0, WORD_LIMIT).join(' ');
                postInput.value = trimmedText;
                const finalWords = postInput.value.match(/\S+/g) || [];
                wordCountDisplay.innerText = `${finalWords.length} / ${WORD_LIMIT} words`;
                wordCountDisplay.style.color = "var(--red)";
            } else {
                wordCountDisplay.innerText = `${words.length} / ${WORD_LIMIT} words`;
                wordCountDisplay.style.color = "var(--text-muted)";
            }
        };

        postInput.addEventListener('input', updateWordCount);
        postInput.addEventListener('keyup', updateWordCount);
        postInput.addEventListener('change', updateWordCount);
    </script>
</body>
</html>
