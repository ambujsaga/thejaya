        });

        window.switchAuthTab = (tab) => {
            if(tab === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-signup').classList.remove('active');
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('signup-form').style.display = 'none';
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('signup-form').style.display = 'block';
                document.getElementById('login-form').style.display = 'none';
            }
        };

        window.handleAuthSubmit = async (event, mode) => {
            event.preventDefault();
            
            let uname = "", pass = "";
            if(mode === 'login') {
                uname = document.getElementById('login-username').value.toLowerCase().replace(/\s+/g,'').trim();
                pass = document.getElementById('login-pass').value.trim();
            } else {
                uname = document.getElementById('signup-username').value.toLowerCase().replace(/\s+/g,'').trim();
                pass = document.getElementById('signup-pass').value.trim();
            }

            if(!uname || !pass) {
                alert("Please fill all fields!");
                return;
            }

            const pseudoEmail = uname + "@thejaya.com";

            if(mode === 'login') {
                try {
                    await signInWithEmailAndPassword(auth, pseudoEmail, pass);
                } catch (err) {
                    if(err.code === "auth/wrong-password" || err.code === "auth/invalid-credential" || err.code === "auth/user-not-found") {
                        alert("Invalid Username or Password!");
                    } else {
                        alert("Error: " + err.message);
                    }
                }
            } else {
                try {
                    const checkSnap = await getDocs(query(collection(db, "users"), where("username", "==", uname)));
                    if(!checkSnap.empty) {
                        alert("Username already taken! Please choose a unique one.");
                        return;
                    }

                    const cred = await createUserWithEmailAndPassword(auth, pseudoEmail, pass);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        username: uname,
                        uid: cred.user.uid,
                        pic: defaultAvtr,
                        email: pseudoEmail,
                        lastChange: Date.now()
                    });
                    alert("Account Created successfully!");
                    location.reload();
                } catch (err) {
                    if(err.code === "auth/email-already-in-use") {
                        alert("Username already registered!");
                    } else {
                        alert("Signup Error: " + err.message);
                    }
                }
            }
        };

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const dSnap = await getDoc(doc(db, "users", user.uid));
                
                if(!dSnap.exists()) {
                    let baseUsername = user.email ? user.email.split('@')[0] : "user" + Math.floor(Math.random() * 1000);
                    baseUsername = baseUsername.toLowerCase().replace(/\s+/g,'').trim();
                    
                    const checkSnap = await getDocs(query(collection(db, "users"), where("username", "==", baseUsername)));
                    if(!checkSnap.empty) {
                        baseUsername = baseUsername + Math.floor(Math.random() * 100);
                    }

                    await setDoc(doc(db, "users", user.uid), {
                        username: baseUsername,
                        uid: user.uid,
                        pic: user.photoURL || defaultAvtr,
                        email: user.email,
                        lastChange: Date.now()
                    });
                } else {
                    await updateDoc(doc(db, "users", user.uid), {
                        pic: user.photoURL || defaultAvtr,
                        email: user.email
                    });
                }
            } catch (err) {
                alert("Google Sign-In Error: " + err.message);
            }
        };

        window.showGuestFeed = () => {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadFeed("feed", null);
        };
        document.getElementById('guest-trigger').onclick = showGuestFeed;

        window.requireLogin = (cb) => {
            if(!auth.currentUser) {
                alert("Authentication required!");
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('auth-section').style.display = 'block';
            } else cb();
        };

        window.navTo = (v, isMe = true, other = null) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            
            if(auth.currentUser) {
                document.getElementById('head-pic').src = (me && me.pic) ? me.pic : defaultAvtr;
            }

            if(v === 'home') loadFeed("feed", null);
            if(v === 'profile') {
                const user = isMe ? me : other;
                document.getElementById('u-img').src = (user.pic && user.pic !== "null") ? user.pic : defaultAvtr;
                document.getElementById('u-name').innerText = "@" + (user.username || "user");
                document.getElementById('my-controls').style.display = isMe ? 'block' : 'none';
                
                const verifySection = document.getElementById('verification-section');
                if(isMe && auth.currentUser) {
                    verifySection.style.display = 'block';
                    const statusText = document.getElementById('verify-status-text');
                    
                    if(auth.currentUser.providerData.some(p => p.providerId === 'google.com')) {
                        statusText.innerHTML = `✅ Google Connected (${user.email || auth.currentUser.email})`;
                        statusText.style.color = "var(--primary)";
                    } else {
                        statusText.innerHTML = "🔗 Traditional Password Account";
                        statusText.style.color = "var(--text-muted)";
                    }
                } else {
                    verifySection.style.display = 'none';
                }

                loadFeed("u-feed", user.uid);
            }
        };

        function loadFeed(divId, uid) {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";
                let stars = 0, posts = 0;
                s.forEach(d => {
                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }
                    
                    const userPic = (p.pic && p.pic !== "" && p.pic !== "null") ? p.pic : defaultAvtr;
                    const isStarred = auth.currentUser ? p.stars?.includes(auth.currentUser.uid) : false;
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${userPic}" class="p-pic" onerror="this.src='${defaultAvtr}'">
                            <div class="user-info">
                                <strong onclick="requireLogin(() => findUserByUname('${p.username}'))" style="cursor:pointer;">@${p.username || 'user'}</strong>
                                <span class="post-time">${timeAgo(p.time)}</span>
                            </div>
                            ${(auth.currentUser && auth.currentUser.uid === p.uid) ? `<div onclick="delPost('${d.id}')" style="margin-left:auto; cursor:pointer;">${iconDelete}</div>` : ''}
                        </div>
                        <p style="margin: 0; line-height:1.5;">${p.text}</p>
                        <div class="action-bar">
                            <span class="action-btn" onclick="starIt('${d.id}', ${isStarred})" style="color:${isStarred?'var(--star)':''}">
                                ${iconStar} ${p.stars?.length || 0}
                            </span>
                            <span class="action-btn" onclick="requireLogin(() => toggleComs('${d.id}'))">
                                ${iconComment} ${p.comments?.length || 0}
                            </span>
                            <span class="action-btn" onclick="sharePost('${p.text.replace(/'/g, "\\'")}', '${p.username || 'user'}')">
                                ${iconShare} Share
                            </span>
                        </div>
                        <div id="drawer-${d.id}" class="comment-drawer">
                            <div id="list-${d.id}">${(p.comments || []).map((c, i) => `
                                <div style="margin-bottom:8px; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
                                    <span><b style="color:var(--primary)">@${c.user || 'user'}</b>: ${c.msg}</span>
                                    ${(auth.currentUser && (auth.currentUser.uid === c.uid || auth.currentUser.uid === p.uid)) ? `<div onclick="delCom('${d.id}', ${i})" style="cursor:pointer;">${iconDelete}</div>` : ''}
                                </div>`).join('')}</div>
                            <div style="display:flex; gap:8px; margin-top:15px;">
                                <input id="in-${d.id}" placeholder="Reply...">
                                <button onclick="addCom('${d.id}')" class="btn-primary" style="width:auto;">Send</button>
                            </div>
                        </div>
                    `;
                    div.appendChild(el);
                });
                if(uid) { document.getElementById('s-stars').innerText = stars; document.getElementById('s-posts').innerText = posts; }
            });
        }

        window.starIt = async (id, has) => { 
            if(!auth.currentUser) { alert("Please login first!"); return; }
            await updateDoc(doc(db, "posts", id), { stars: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); 
        };

        window.checkEditUsername = async () => {
            const now = Date.now();
            if(now - me.lastChange < 7*24*60*60*1000) { alert("Please wait 7 days! or Use this link to make the change immediately.    https://thejaya.vercel.app/username.html"); return; }
            let newU = prompt("New username:");
            if(newU) { 
                newU = newU.toLowerCase().replace(/\s+/g,'');
                const q = query(collection(db, "users"), where("username", "==", newU));
                const querySnapshot = await getDocs(q);
                if(!querySnapshot.empty) { alert("Username already taken!"); return; }
                await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newU, lastChange: now }); location.reload(); 
            }
        };

        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { text: t, username: me.username || 'user', pic: me.pic || defaultAvtr, uid: auth.currentUser.uid, stars: [], comments: [], time: Date.now() });
            document.getElementById('postInput').value = ""; setPostModal(false);
        };

        window.addCom = async (id) => {
            const i = document.getElementById('in-'+id);
            if(!i.value.trim()) return;
            await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, user: me.username || 'user', msg: i.value }) });
            i.value = "";
        };

        window.delCom = async (pid, idx) => {
            const r = doc(db, "posts", pid); const s = await getDoc(r);
            let c = s.data().comments; c.splice(idx, 1);
            await updateDoc(r, { comments: c });
        };

        window.findUser = async () => {
            let qStr = document.getElementById('sq').value;
            if(!qStr || !qStr.trim()) return;
            qStr = qStr.toLowerCase().trim();
            const s = await getDocs(query(collection(db, "users"), where("username", "==", qStr)));
            if(s.empty) alert("No user found!"); else navTo('profile', false, s.docs[0].data());
        };

        window.findUserByUname = async (un) => {
            if(!un) return;
            const s = await getDocs(query(collection(db, "users"), where("username", "==", un.toLowerCase().trim())));
            if(!s.empty) navTo('profile', false, s.docs[0].data());
        };

        window.delPost = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };
        window.toggleSearch = () => { const r = document.getElementById('search-row'); r.style.display = r.style.display === 'block'?'none':'block'; };
        window.toggleComs = (id) => { const d = document.getElementById('drawer-'+id); d.style.display = d.style.display === 'block'?'none':'block'; };
        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        
        window.sharePost = async (text, username) => {
            const shareText = `"${text}"\n\n~by @${username} on The Jaya\n\nCheckout here:`;
            const shareUrl = window.location.href;
            if (navigator.share) {
                try { await navigator.share({ title: 'The Jaya Post', text: shareText, url: shareUrl }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(`${shareText} ${shareUrl}`);
                alert("Link & Text copied!");
            }
        };

        window.logout = () => { signOut(auth); location.reload(); };

        const postInput = document.getElementById('postInput');
        const wordCountDisplay = document.getElementById('word-count');
        const WORD_LIMIT = 110;

        const updateWordCount = () => {
            const val = postInput.value;
            const words = val.match(/\S+/g) || []; 
            if (words.length > WORD_LIMIT) {
                const trimmedText = val.split(/\s+/).slice(0, WORD_LIMIT).join(' ');
                postInput.value = trimmedText;
                const finalWords = postInput.value.match(/\S+/g) || [];
                wordCountDisplay.innerText = `${finalWords.length} / ${WORD_LIMIT} words`;
                wordCountDisplay.style.color = "var(--red)";
            } else {
                wordCountDisplay.innerText = `${words.length} / ${WORD_LIMIT} words`;
                wordCountDisplay.style.color = "var(--text-muted)";
            }
        };

        postInput.addEventListener('input', updateWordCount);
        postInput.addEventListener('keyup', updateWordCount);
        postInput.addEventListener('change', updateWordCount);
    </script>
</body>
</html>
