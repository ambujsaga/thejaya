<div style="margin: 0; padding: 20px; min-height: 100vh; width: 100vw; background-color: #0d061a; color: white; font-family: sans-serif;">
    
    <h2 style="color: #ffcc33; text-align: center;">AI Notes Viewer</h2>

    <div id="content-area" style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 80px;">
        Loading notes...
    </div>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px;">
        <button onclick="loadNotes()" style="padding: 12px 30px; border-radius: 50px; background: #ffcc33; border: none; font-weight: bold; cursor: pointer;">
            REFRESH NOTES
        </button>
        <a href="index.html" style="text-decoration: none; background: rgba(255, 255, 255, 0.1); padding: 12px 40px; border-radius: 50px; color: white; border: 1px solid rgba(255,255,255,0.2);">
            BACK
        </a>
    </div>
</div>

<script>
async function loadNotes() {
    const contentArea = document.getElementById('content-area');
    const targetUrl = 'https://quote-bot--ambujewns404.replit.app';
    
    // CORS bypass karne ke liye proxy ka use (agar zaroorat padi)
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

    try {
        const response = await fetch(proxyUrl);
        const data = await response.text();
        
        // Isse website ka text screen par aa jayega
        contentArea.innerHTML = data;
        
        // Ab aap normal text ki tarah select aur copy kar payenge
    } catch (error) {
        contentArea.innerHTML = "Error: Data load nahi ho paya. Ek baar check karein ki Replit app 'Run' ho rahi hai ya nahi.";
        console.error("Fetch error:", error);
    }
}

// Page load hote hi function run ho jaye
window.onload = loadNotes;
</script>
