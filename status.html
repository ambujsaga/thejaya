<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Status Room</title>
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.9); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .p-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .red-tick {
            width: 14px;
            height: 14px;
            margin-left: 4px;
            vertical-align: middle;
            fill: #ff4444;
        }

        /* NEW RED TICK CSS IMPORTED FROM INDEX */
        .red-tick-svg {
            width: 16px;
            height: 16px;
            color: #ff4444;
            margin-left: 4px;
            vertical-align: middle;
            filter: drop-shadow(0 0 5px rgba(255, 68, 68, 0.4));
            display: inline-block;
        }

        /* --- STORIES TRAY COMPONENT --- */
        .stories-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 25px;
        }

        .stories-tray::-webkit-scrollbar { display: none; }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid var(--text-muted); /* Default grey for seen */
            padding: 2px;
            transition: all 0.3s ease;
        }

        .story-ring.unseen {
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-username {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CONTROL CARD PANEL --- */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .toggle-upload-btn {
            width: 100%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }
        .toggle-upload-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .upload-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .file-input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-upload-label {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-upload-label svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        /* --- FULLSCREEN ULTRA VIEW MODAL --- */
        .status-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .viewer-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        
        .viewer-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
        }

        .viewer-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .action-btn.delete-btn { color: var(--red); }

        .viewer-content {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-text {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            word-break: break-word;
        }

        /* --- VIEWER NAVIGATION & COUNTER --- */
        .viewer-nav-area {
            position: absolute;
            top: 70px;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            z-index: 5;
        }
        
        .nav-left, .nav-right {
            flex: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .status-counter-display {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        /* --- VIEWER LIST MODAL --- */
        .viewers-list-modal {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            max-height: 50vh;
            overflow-y: auto;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
        }
        
        .viewers-list-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .viewer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .viewer-item img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* --- FLOATING BUTTONS (HOME PAGE) --- */
        .floating-actions {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        .float-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .float-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        .float-btn.bits-btn {
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img id="user-avatar" src="" class="p-pic" alt="Profile">
            <div>
                <div style="font-weight: bold; font-size: 18px; display: flex; align-items: center;" id="welcome-username-container">

                        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" fill="none"/></svg>

    <div class="floating-actions">

        <a href="index.html" class="float-btn">> Back</a>
    </div>

    <div class="status-viewer" id="status-player-modal">
        <div class="progress-container"><div class="progress-bar" id="status-progress"></div></div>
        
        <div class="viewer-header">
            <div class="viewer-user-info">
                <img id="viewer-avatar" src="" class="p-pic" style="width: 35px; height: 35px;">
                <strong id="viewer-username-container" style="display:flex; align-items:center;">
                    <span id="viewer-username"></span>

    <template id="red-tick-svg">
        <svg class="red-tick" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCwsiYyKy6r2rKu-nGy7lu9Zv0aL9SE-8M",
            authDomain: "links-62592.firebaseapp.com",
            databaseURL: "https://links-62592-default-rtdb.firebaseio.com",
            projectId: "links-62592",
            storageBucket: "links-62592.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.db = db;
        window.doc = doc;
        window.setDoc = setDoc;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;

        let activeSessionUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) {
                        activeSessionUser = userSnap.data();
                        initializeStatusEngine();
                    } else {
                        throwAuthError();
                    }
                } catch (e) {
                    throwAuthError();
                }
            } else {
                throwAuthError();
            }
        });

        function throwAuthError() {
            alert("❌ Access Denied: Please login via the official website 'The Jaya' first!");
            window.location.href = "index.html";
        }

        function initializeStatusEngine() {
            document.getElementById('user-avatar').src = activeSessionUser.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-username').innerText = "@" + activeSessionUser.username;
            
            if (activeSessionUser.hasRedTick || activeSessionUser.redTick || activeSessionUser.verified || activeSessionUser.role === 'admin') {
                document.getElementById('welcome-username-container').innerHTML += `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }

            window.currentUserProfile = activeSessionUser;
            window.globalStories = JSON.parse(localStorage.getItem('thejaya_stories_db_live') || '[]');
            window.renderStoriesTray();
            window.setupRealtimeStories(); 
        }
    </script>

    <script>
        const PHOTO_LIMIT = 10;
        const VIDEO_LIMIT = 5;
        const EXPIRATION_TIME = 24 * 60 * 60 * 1000;

        let storyPlaybackTimer = null;
        let progressAnimationInterval = null;
        let currentViewingStory = null;
        let currentSlideIndex = 0;
        let isViewerPaused = false;
        
        window.globalStories = [];

        window.setupRealtimeStories = function() {
            const storiesRef = window.collection(window.db, "status_stories");
            window.onSnapshot(storiesRef, (snapshot) => {
                let liveDatabase = [];
                snapshot.forEach((doc) => {
                    liveDatabase.push(doc.data());
                });
                const now = Date.now();
                liveDatabase.forEach(story => {
                    story.slides = story.slides.filter(slide => (now - slide.timestamp) < EXPIRATION_TIME);
                });
                window.globalStories = liveDatabase.filter(story => story.slides.length > 0);
                localStorage.setItem('thejaya_stories_db_live', JSON.stringify(window.globalStories));
                window.renderStoriesTray();
            });
        };

        function toggleUploadUI() {
            const ui = document.getElementById('upload-ui-container');
            ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        }

        function validateFiles() {
            const photos = document.getElementById('photo-files').files;
            const videos = document.getElementById('video-files').files;
            const indicator = document.getElementById('file-count-status');
            if(photos.length > PHOTO_LIMIT) { alert(`Maximum ${PHOTO_LIMIT} photos allowed!`); document.getElementById('photo-files').value = ""; return; }
            if(videos.length > VIDEO_LIMIT) { alert(`Maximum ${VIDEO_LIMIT} videos allowed!`); document.getElementById('video-files').value = ""; return; }
            indicator.innerText = `Selected: ${photos.length} Photo(s) | ${videos.length} Video(s)`;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxDim = 1200;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) { height *= maxDim / width; width = maxDim; }
                            else { width *= maxDim / height; height = maxDim; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.7;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        if (dataUrl.length > 1000000) { quality = 0.5; dataUrl = canvas.toDataURL('image/jpeg', quality); }
                        resolve(dataUrl);
                    };
                };
            });
        }

        async function publishStatus() {
            if (!window.currentUserProfile) return;
            const textContent = document.getElementById('status-text-input').value.trim();
            const photoFiles = document.getElementById('photo-files').files;
            const videoFiles = document.getElementById('video-files').files;

            if (!textContent && photoFiles.length === 0 && videoFiles.length === 0) { alert("Please write something or select media to upload!"); return; }

            for (let i = 0; i < videoFiles.length; i++) {
                if (videoFiles[i].size > 1024 * 1024) { alert(`Video "${videoFiles[i].name}" is too large. Please upload video smaller than 1MB.`); return; }
            }

            document.querySelector('.btn-submit').innerText = "Processing & Uploading...";
            document.querySelector('.btn-submit').disabled = true;

            const newSlides = [];
            const now = Date.now();

            if (textContent) { newSlides.push({ id: 's_'+now+'_t', type: 'text', content: textContent, duration: 10000, timestamp: now, viewedBy: [] }); }

            for(let i=0; i<photoFiles.length; i++) {
                const compressedB64 = await compressImage(photoFiles[i]);
                newSlides.push({ id: 's_'+now+'_p'+i, type: 'image', content: compressedB64, duration: 10000, timestamp: now, viewedBy: [] });
            }

            for(let i=0; i<videoFiles.length; i++) {
                const b64Data = await convertToBase64(videoFiles[i]);
                newSlides.push({ id: 's_'+now+'_v'+i, type: 'video', content: b64Data, duration: 25000, timestamp: now, viewedBy: [] });
            }
            
            const existingUserIndex = window.globalStories.findIndex(story => story.uid === window.currentUserProfile.uid);
            let storyDataToSave;

            if (existingUserIndex > -1) {
                storyDataToSave = { ...window.globalStories[existingUserIndex] };
                storyDataToSave.slides.push(...newSlides);
            } else {
                storyDataToSave = {
                    uid: window.currentUserProfile.uid,
                    username: window.currentUserProfile.username,
                    avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    redTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || window.currentUserProfile.verified || false,
                    hasRedTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || window.currentUserProfile.verified || false,
                    slides: newSlides
                };
            }

            try {
                const userDocRef = window.doc(window.db, "status_stories", window.currentUserProfile.uid);
                await window.setDoc(userDocRef, storyDataToSave);
                document.getElementById('status-text-input').value = "";
                document.getElementById('photo-files').value = "";
                document.getElementById('video-files').value = "";
                document.getElementById('file-count-status').innerText = "";
                toggleUploadUI();
                alert("🚀 Status uploaded successfully!");
            } catch (error) {
                console.error("Upload Error: ", error);
                alert("❌ Upload failed. Please try again.");
            } finally {
                document.querySelector('.btn-submit').innerText = "Upload Status";
                document.querySelector('.btn-submit').disabled = false;
            }
        }

        window.renderStoriesTray = function() {
            const tray = document.getElementById('stories-tray-zone');
            tray.innerHTML = "";
            if(window.globalStories.length === 0) { tray.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding-left:5px;">No active updates available...</div>`; return; }
            window.globalStories.forEach(userStory => {
                const node = document.createElement('div');
                node.className = 'story-node';
                node.onclick = () => openStatusViewer(userStory);
                const isCurrentUser = (window.currentUserProfile && userStory.uid === window.currentUserProfile.uid);
                let hasUnseen = false;
                if(!isCurrentUser && window.currentUserProfile) {
                    hasUnseen = userStory.slides.some(slide => !slide.viewedBy.some(v => v.uid === window.currentUserProfile.uid));
                }
                const tickHtml = (userStory.hasRedTick || userStory.redTick) ? `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                node.innerHTML = `<div class="story-ring ${hasUnseen ? 'unseen' : ''}"><img src="${userStory.avatar}" alt="user"></div><div class="story-username">@${userStory.username} ${tickHtml}</div>`;
                tray.appendChild(node);
            });
        }

        function openStatusViewer(storyData) {
            currentViewingStory = storyData;
            currentSlideIndex = 0;
            const modal = document.getElementById('status-player-modal');
            document.getElementById('viewer-avatar').src = storyData.avatar;
            const usernameContainer = document.getElementById('viewer-username-container');
            usernameContainer.innerHTML = `<span id="viewer-username">@${storyData.username}</span>`;
            if(storyData.hasRedTick || storyData.redTick) {
                usernameContainer.innerHTML += `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }
            modal.style.display = 'flex';
            playSlideshow();
        }

        window.skipNext = function() { currentSlideIndex++; if(currentSlideIndex >= currentViewingStory.slides.length) closeStatusViewer(); else playSlideshow(); }
        window.skipPrev = function() { currentSlideIndex--; if(currentSlideIndex < 0) currentSlideIndex = 0; playSlideshow(); }

        function playSlideshow() {
            if(currentSlideIndex >= currentViewingStory.slides.length) { closeStatusViewer(); return; }
            const renderTarget = document.getElementById('viewer-body-render');
            const progressBar = document.getElementById('status-progress');
            renderTarget.innerHTML = "";
            progressBar.style.width = "0%";
            isViewerPaused = false;
            const slide = currentViewingStory.slides[currentSlideIndex];
            const isOwner = (window.currentUserProfile && currentViewingStory.uid === window.currentUserProfile.uid);
            document.getElementById('status-counter-display').innerText = `${currentSlideIndex + 1} / ${currentViewingStory.slides.length}`;

            if (!isOwner && window.currentUserProfile) {
                const alreadyViewed = slide.viewedBy.some(v => v.uid === window.currentUserProfile.uid);
                if (!alreadyViewed) { slide.viewedBy.push({ uid: window.currentUserProfile.uid, username: window.currentUserProfile.username, avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png", hasRedTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || false }); syncToDatabase(); }
            }

            if (isOwner) { document.getElementById('delete-status-btn').style.display = 'flex'; document.getElementById('view-count-btn').style.display = 'flex'; document.getElementById('view-count-text').innerText = slide.viewedBy.length; } 
            else { document.getElementById('delete-status-btn').style.display = 'none'; document.getElementById('view-count-btn').style.display = 'none'; }

            let playbackTimeoutLimit = slide.duration;
            if (slide.type === 'text') { const textBlock = document.createElement('div'); textBlock.className = 'viewer-text'; textBlock.innerText = slide.content; renderTarget.appendChild(textBlock); } 
            else if (slide.type === 'image') { const imgNode = document.createElement('img'); imgNode.src = slide.content; renderTarget.appendChild(imgNode); } 
            else if (slide.type === 'video') { 
                const videoNode = document.createElement('video'); videoNode.src = slide.content; videoNode.autoplay = true; videoNode.muted = false; videoNode.playsInline = true; renderTarget.appendChild(videoNode); 
                videoNode.onloadedmetadata = function() { if(videoNode.duration < 25) playbackTimeoutLimit = videoNode.duration * 1000; };
            }

            let elapsedCounter = 0;
            const intervalTickRate = 50; 
            clearInterval(progressAnimationInterval);
            progressAnimationInterval = setInterval(() => {
                if (isViewerPaused) return;
                elapsedCounter += intervalTickRate;
                const calculatedPercentage = (elapsedCounter / playbackTimeoutLimit) * 100;
                progressBar.style.width = Math.min(calculatedPercentage, 100) + "%";
                if(elapsedCounter >= playbackTimeoutLimit) { clearInterval(progressAnimationInterval); currentSlideIndex++; playSlideshow(); }
            }, intervalTickRate);
        }

        window.deleteCurrentStatus = function() {
            if(confirm("Are you sure you want to delete this status?")) {
                currentViewingStory.slides.splice(currentSlideIndex, 1);
                syncToDatabase();
                if (currentViewingStory.slides.length === 0) closeStatusViewer();
                else { if(currentSlideIndex >= currentViewingStory.slides.length) currentSlideIndex = currentViewingStory.slides.length - 1; playSlideshow(); }
            }
        }

        window.showViewers = function() { isViewerPaused = true; const slide = currentViewingStory.slides[currentSlideIndex]; const listContent = document.getElementById('viewers-list-content'); if (slide.viewedBy.length === 0) listContent.innerHTML = `<div style="color:var(--text-muted);font-size:13px;text-align:center;">No views yet.</div>`; else listContent.innerHTML = slide.viewedBy.map(v => { const vTick = v.hasRedTick || v.redTick ? '<svg viewBox="0 0 24 24" class="red-tick-svg" style="width:14px;height:14px;" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''; return `<div class="viewer-item"><img src="${v.avatar}"><span style="display:flex;align-items:center;">@${v.username}${vTick}</span></div>`; }).join(''); document.getElementById('viewers-list-panel').style.display = 'block'; }
        window.hideViewers = function() { document.getElementById('viewers-list-panel').style.display = 'none'; isViewerPaused = false; }
        async function syncToDatabase() { if(!currentViewingStory) return; const userDocRef = window.doc(window.db, "status_stories", currentViewingStory.uid); try { if (currentViewingStory.slides.length === 0) await window.deleteDoc(userDocRef); else await window.setDoc(userDocRef, currentViewingStory); } catch(e) { console.error("Error updating story state:", e); } }
        window.closeStatusViewer = function() { document.getElementById('status-player-modal').style.display = 'none'; document.getElementById('viewers-list-panel').style.display = 'none'; document.getElementById('viewer-body-render').innerHTML = ""; clearInterval(progressAnimationInterval); clearTimeout(storyPlaybackTimer); currentViewingStory = null; }
    </script>
</body>
</html>
