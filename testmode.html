<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Status Room & Connect</title>
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.9); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .p-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .red-tick {
            width: 14px;
            height: 14px;
            margin-left: 4px;
            vertical-align: middle;
            fill: #ff4444;
        }

        .red-tick-svg {
            width: 16px;
            height: 16px;
            color: #ff4444;
            margin-left: 4px;
            vertical-align: middle;
            filter: drop-shadow(0 0 5px rgba(255, 68, 68, 0.4));
            display: inline-block;
        }

        .stories-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 25px;
        }

        .stories-tray::-webkit-scrollbar { display: none; }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid var(--text-muted); 
            padding: 2px;
            transition: all 0.3s ease;
        }

        .story-ring.unseen {
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-username {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .toggle-upload-btn {
            width: 100%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }
        .toggle-upload-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .upload-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .file-input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-upload-label {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-upload-label svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #030a1a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        .status-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .viewer-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        
        .viewer-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
        }

        .viewer-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .action-btn.delete-btn { color: var(--red); }

        .viewer-content {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-text {
            font-size: 24px;
            text-align: center;
            padding: 20px;
            word-break: break-word;
        }

        .viewer-nav-area {
            position: absolute;
            top: 70px;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            z-index: 5;
        }
        
        .nav-left, .nav-right {
            flex: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .status-counter-display {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .viewers-list-modal {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            max-height: 50vh;
            overflow-y: auto;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
        }
        
        .viewers-list-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .viewer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .viewer-item img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        .floating-actions {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        .float-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .float-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        .float-btn.bits-btn {
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* ---------------------------------------------------- */
        /* NEW CHAT & CALL CSS ADDITIONS                        */
        /* ---------------------------------------------------- */
        
        .chat-fab {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--bg);
            border: none;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--neon-shadow);
            cursor: pointer;
            z-index: 101;
        }

        .unread-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--red);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        .chat-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            flex-direction: column;
        }

        .chat-header {
            background: var(--card-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .chat-search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-user-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .chat-user-item img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-user-item .connect-btn {
            margin-left: auto;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Active Chat Room UI */
        .chat-room {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10001;
            flex-direction: column;
        }

        .room-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            gap: 10px;
        }

        .room-actions {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .room-actions svg { width: 24px; height: 24px; fill: var(--primary); cursor: pointer; }

        .messages-feed {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }
        
        .msg-bubble.sent { background: rgba(0, 229, 255, 0.15); border: 1px solid rgba(0, 229, 255, 0.3); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-bubble.received { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 2px; }

        .msg-meta { font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 5px; display: flex; justify-content: flex-end; gap: 5px; }
        .msg-options { position: absolute; top: 0; right: -25px; display: none; cursor: pointer; color: var(--text-muted); }
        .msg-bubble:hover .msg-options { display: block; }
        .msg-edited-tag { font-size: 9px; font-style: italic; color: #ffeb3b; }
        
        .msg-image { width: 100%; max-width: 200px; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        .download-btn { font-size: 11px; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 5px;}

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--card-bg);
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            align-items: center;
        }

        .chat-input-area input[type="text"] { margin-bottom: 0; flex: 1; }
        .chat-attach-btn { background: none; border: none; color: var(--primary); cursor: pointer; }
        .chat-send-btn { background: var(--primary); border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* Call Screen UI */
        .call-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10005;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
        }

        .call-video-container { position: absolute; inset: 0; z-index: 0; }
        .call-video-container video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 120px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 2px solid var(--primary); z-index: 2; background: #222;}

        .call-info { z-index: 1; text-align: center; margin-top: 50px; }
        .call-info img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; }

        .call-controls { z-index: 1; display: flex; gap: 30px; margin-bottom: 30px; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 30px; }
        .call-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px;}
        .btn-cut { background: var(--red); color: white; }
        .btn-speaker { background: rgba(255,255,255,0.2); color: white; }
        .btn-speaker.active { background: var(--primary); color: black; }
        
        .incoming-call-modal {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid var(--primary);
            padding: 15px 25px;
            border-radius: 20px;
            z-index: 10006;
            box-shadow: 0 0 20px rgba(0,229,255,0.4);
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img id="user-avatar" src="" class="p-pic" alt="Profile">
            <div>
                <div style="font-weight: bold; font-size: 18px; display: flex; align-items: center;" id="welcome-username-container">
                    <span id="welcome-username">@username</span>
                </div>
                <div style="font-size: 12px; color: var(--text-muted);">The Jaya Status Room</div>
            </div>
        </header>

        <div class="stories-tray" id="stories-tray-zone"></div>

        <div class="card">
            <button class="toggle-upload-btn" onclick="toggleUploadUI()">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                Add New Status
            </button>
            
            <div class="upload-container" id="upload-ui-container">
                <textarea id="status-text-input" placeholder="What's on your mind? Type a status..."></textarea>
                
                <div class="file-input-wrapper">
                    <label class="btn-upload-label">
                        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                        Photos
                        <input type="file" id="photo-files" accept="image/*" multiple style="display: none;" onchange="validateFiles()">
                    </label>
                    <label class="btn-upload-label">
                        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" stroke="currentColor" stroke-width="2" fill="none"/><line x1="7" y1="2" x2="7" y2="22" stroke="currentColor" stroke-width="2"/><line x1="17" y1="2" x2="17" y2="22" stroke="currentColor" stroke-width="2"/><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/><line x1="2" y1="7" x2="7" y2="7" stroke="currentColor" stroke-width="2"/><line x1="2" y1="17" x2="7" y2="17" stroke="currentColor" stroke-width="2"/><line x1="17" y1="17" x2="22" y2="17" stroke="currentColor" stroke-width="2"/><line x1="17" y1="7" x2="22" y2="7" stroke="currentColor" stroke-width="2"/></svg>
                        Videos
                        <input type="file" id="video-files" accept="video/*" multiple style="display: none;" onchange="validateFiles()">
                    </label>
                </div>
                <div id="file-count-status" style="font-size: 12px; margin-bottom: 10px; color: var(--text-muted);"></div>
                <button class="btn-submit" onclick="publishStatus()">Upload Status</button>
            </div>
        </div>
    </div>

    <button class="chat-fab" onclick="openChatMainModal()">
        <svg style="width:30px;height:30px;fill:currentColor" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span class="unread-badge" id="global-unread-badge">!</span>
    </button>

    <div class="floating-actions">
        <a href="thejayabit.html" class="float-btn bits-btn">Bits</a>
        <a href="index.html" class="float-btn">> Back</a>
    </div>

    <div class="status-viewer" id="status-player-modal">
        <div class="progress-container"><div class="progress-bar" id="status-progress"></div></div>
        
        <div class="viewer-header">
            <div class="viewer-user-info">
                <img id="viewer-avatar" src="" class="p-pic" style="width: 35px; height: 35px;">
                <strong id="viewer-username-container" style="display:flex; align-items:center;">
                    <span id="viewer-username"></span>
                </strong>
            </div>
            
            <div class="viewer-actions">
                <button id="view-count-btn" class="action-btn" style="display:none;" onclick="showViewers()">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    <span id="view-count-text">0</span>
                </button>
                <button id="delete-status-btn" class="action-btn delete-btn" style="display:none;" onclick="deleteCurrentStatus()">
                    <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
                <button class="action-btn" onclick="closeStatusViewer()">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>
        </div>

        <div class="viewer-nav-area">
            <div class="nav-left" onclick="skipPrev()"></div>
            <div class="nav-right" onclick="skipNext()"></div>
        </div>

        <div class="viewer-content" id="viewer-body-render"></div>

        <div id="status-counter-display" class="status-counter-display">1/1</div>
        
        <div id="viewers-list-panel" class="viewers-list-modal">
            <div class="viewers-list-header">
                <span>Viewed By</span>
                <span style="cursor:pointer;" onclick="hideViewers()">
                    <svg style="width:20px;height:20px;fill:var(--text-main)" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </span>
            </div>
            <div id="viewers-list-content"></div>
        </div>
    </div>

    <div class="chat-modal-overlay" id="chat-main-modal">
        <div class="chat-header">
            <h3>Chats</h3>
            <button class="action-btn" onclick="closeChatMainModal()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/></svg>
            </button>
        </div>
        <div style="padding: 15px;">
            <input type="text" class="chat-search-bar" id="chat-user-search" placeholder="Search username to connect..." oninput="handleUserSearch()">
        </div>
        <div class="chat-list" id="chat-inbox-list">
            </div>
    </div>

    <div class="chat-room" id="active-chat-room">
        <div class="room-header">
            <button class="action-btn" onclick="closeActiveChat()">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCwsiYyKy6r2rKu-nGy7lu9Zv0aL9SE-8M",
            authDomain: "links-62592.firebaseapp.com",
            databaseURL: "https://links-62592-default-rtdb.firebaseio.com",

        function initializeStatusEngine() {

            if (activeSessionUser.hasRedTick || activeSessionUser.redTick || activeSessionUser.verified || activeSessionUser.role === 'admin') {
                document.getElementById('welcome-username-container').innerHTML += `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;

    <script>
        // ==========================================
        // EXISTING STATUS CODE (UNTOUCHED)
        // ==========================================
        const PHOTO_LIMIT = 10;
        const VIDEO_LIMIT = 5;
        const EXPIRATION_TIME = 24 * 60 * 60 * 1000;

        let storyPlaybackTimer = null;
        let progressAnimationInterval = null;
        let currentViewingStory = null;
        let currentSlideIndex = 0;
        let isViewerPaused = false;
        
        window.globalStories = [];

        window.setupRealtimeStories = function() {
            const storiesRef = window.collection(window.db, "status_stories");
            window.onSnapshot(storiesRef, (snapshot) => {
                let liveDatabase = [];
                snapshot.forEach((doc) => {
                    liveDatabase.push(doc.data());
                });
                const now = Date.now();
                liveDatabase.forEach(story => {
                    story.slides = story.slides.filter(slide => (now - slide.timestamp) < EXPIRATION_TIME);
                });
                window.globalStories = liveDatabase.filter(story => story.slides.length > 0);
                localStorage.setItem('thejaya_stories_db_live', JSON.stringify(window.globalStories));
                window.renderStoriesTray();
            });
        };

        function toggleUploadUI() {
            const ui = document.getElementById('upload-ui-container');
            ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        }

        function validateFiles() {
            const photos = document.getElementById('photo-files').files;
            const videos = document.getElementById('video-files').files;
            const indicator = document.getElementById('file-count-status');
            if(photos.length > PHOTO_LIMIT) { alert(`Maximum ${PHOTO_LIMIT} photos allowed!`); document.getElementById('photo-files').value = ""; return; }
            if(videos.length > VIDEO_LIMIT) { alert(`Maximum ${VIDEO_LIMIT} videos allowed!`); document.getElementById('video-files').value = ""; return; }
            indicator.innerText = `Selected: ${photos.length} Photo(s) | ${videos.length} Video(s)`;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxDim = 1200;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) { height *= maxDim / width; width = maxDim; }
                            else { width *= maxDim / height; height = maxDim; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.7;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        if (dataUrl.length > 1000000) { quality = 0.5; dataUrl = canvas.toDataURL('image/jpeg', quality); }
                        resolve(dataUrl);
                    };
                };
            });
        }

        async function publishStatus() {
            if (!window.currentUserProfile) return;
            const textContent = document.getElementById('status-text-input').value.trim();
            const photoFiles = document.getElementById('photo-files').files;
            const videoFiles = document.getElementById('video-files').files;

            if (!textContent && photoFiles.length === 0 && videoFiles.length === 0) { alert("Please write something or select media to upload!"); return; }

            for (let i = 0; i < videoFiles.length; i++) {
                if (videoFiles[i].size > 1024 * 1024) { alert(`Video "${videoFiles[i].name}" is too large. Please upload video smaller than 1MB.`); return; }
            }

            document.querySelector('.btn-submit').innerText = "Processing & Uploading...";
            document.querySelector('.btn-submit').disabled = true;

            const newSlides = [];
            const now = Date.now();

            if (textContent) { newSlides.push({ id: 's_'+now+'_t', type: 'text', content: textContent, duration: 10000, timestamp: now, viewedBy: [] }); }

            for(let i=0; i<photoFiles.length; i++) {
                const compressedB64 = await compressImage(photoFiles[i]);
                newSlides.push({ id: 's_'+now+'_p'+i, type: 'image', content: compressedB64, duration: 10000, timestamp: now, viewedBy: [] });
            }

            for(let i=0; i<videoFiles.length; i++) {
                const b64Data = await convertToBase64(videoFiles[i]);
                newSlides.push({ id: 's_'+now+'_v'+i, type: 'video', content: b64Data, duration: 25000, timestamp: now, viewedBy: [] });
            }
            
            const existingUserIndex = window.globalStories.findIndex(story => story.uid === window.currentUserProfile.uid);
            let storyDataToSave;

            if (existingUserIndex > -1) {
                storyDataToSave = { ...window.globalStories[existingUserIndex] };
                storyDataToSave.slides.push(...newSlides);
            } else {
                storyDataToSave = {
                    uid: window.currentUserProfile.uid,
                    username: window.currentUserProfile.username,
                    avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    redTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || window.currentUserProfile.verified || false,
                    hasRedTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || window.currentUserProfile.verified || false,
                    slides: newSlides
                };
            }

            try {
                const userDocRef = window.doc(window.db, "status_stories", window.currentUserProfile.uid);
                await window.setDoc(userDocRef, storyDataToSave);
                document.getElementById('status-text-input').value = "";
                document.getElementById('photo-files').value = "";
                document.getElementById('video-files').value = "";
                document.getElementById('file-count-status').innerText = "";
                toggleUploadUI();
                alert("🚀 Status uploaded successfully!");
            } catch (error) {
                console.error("Upload Error: ", error);
                alert("❌ Upload failed. Please try again.");
            } finally {
                document.querySelector('.btn-submit').innerText = "Upload Status";
                document.querySelector('.btn-submit').disabled = false;
            }
        }

        window.renderStoriesTray = function() {
            const tray = document.getElementById('stories-tray-zone');
            tray.innerHTML = "";
            if(window.globalStories.length === 0) { tray.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding-left:5px;">No active updates available...</div>`; return; }
            window.globalStories.forEach(userStory => {
                const node = document.createElement('div');
                node.className = 'story-node';
                node.onclick = () => openStatusViewer(userStory);
                const isCurrentUser = (window.currentUserProfile && userStory.uid === window.currentUserProfile.uid);
                let hasUnseen = false;
                if(!isCurrentUser && window.currentUserProfile) {
                    hasUnseen = userStory.slides.some(slide => !slide.viewedBy.some(v => v.uid === window.currentUserProfile.uid));
                }
                const tickHtml = (userStory.hasRedTick || userStory.redTick) ? `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                node.innerHTML = `<div class="story-ring ${hasUnseen ? 'unseen' : ''}"><img src="${userStory.avatar}" alt="user"></div><div class="story-username">@${userStory.username} ${tickHtml}</div>`;
                tray.appendChild(node);
            });
        }

        function openStatusViewer(storyData) {
            currentViewingStory = storyData;
            currentSlideIndex = 0;
            const modal = document.getElementById('status-player-modal');
            document.getElementById('viewer-avatar').src = storyData.avatar;
            const usernameContainer = document.getElementById('viewer-username-container');
            usernameContainer.innerHTML = `<span id="viewer-username">@${storyData.username}</span>`;
            if(storyData.hasRedTick || storyData.redTick) {
                usernameContainer.innerHTML += `<svg viewBox="0 0 24 24" class="red-tick-svg" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }
            modal.style.display = 'flex';
            playSlideshow();
        }

        window.skipNext = function() { currentSlideIndex++; if(currentSlideIndex >= currentViewingStory.slides.length) closeStatusViewer(); else playSlideshow(); }
        window.skipPrev = function() { currentSlideIndex--; if(currentSlideIndex < 0) currentSlideIndex = 0; playSlideshow(); }

        function playSlideshow() {
            if(currentSlideIndex >= currentViewingStory.slides.length) { closeStatusViewer(); return; }
            const renderTarget = document.getElementById('viewer-body-render');
            const progressBar = document.getElementById('status-progress');
            renderTarget.innerHTML = "";
            progressBar.style.width = "0%";
            isViewerPaused = false;
            const slide = currentViewingStory.slides[currentSlideIndex];
            const isOwner = (window.currentUserProfile && currentViewingStory.uid === window.currentUserProfile.uid);
            document.getElementById('status-counter-display').innerText = `${currentSlideIndex + 1} / ${currentViewingStory.slides.length}`;

            if (!isOwner && window.currentUserProfile) {
                const alreadyViewed = slide.viewedBy.some(v => v.uid === window.currentUserProfile.uid);
                if (!alreadyViewed) { slide.viewedBy.push({ uid: window.currentUserProfile.uid, username: window.currentUserProfile.username, avatar: window.currentUserProfile.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png", hasRedTick: window.currentUserProfile.hasRedTick || window.currentUserProfile.redTick || false }); syncToDatabase(); }
            }

            if (isOwner) { document.getElementById('delete-status-btn').style.display = 'flex'; document.getElementById('view-count-btn').style.display = 'flex'; document.getElementById('view-count-text').innerText = slide.viewedBy.length; } 
            else { document.getElementById('delete-status-btn').style.display = 'none'; document.getElementById('view-count-btn').style.display = 'none'; }

            let playbackTimeoutLimit = slide.duration;
            if (slide.type === 'text') { const textBlock = document.createElement('div'); textBlock.className = 'viewer-text'; textBlock.innerText = slide.content; renderTarget.appendChild(textBlock); } 
            else if (slide.type === 'image') { const imgNode = document.createElement('img'); imgNode.src = slide.content; renderTarget.appendChild(imgNode); } 
            else if (slide.type === 'video') { 
                const videoNode = document.createElement('video'); videoNode.src = slide.content; videoNode.autoplay = true; videoNode.muted = false; videoNode.playsInline = true; renderTarget.appendChild(videoNode); 
                videoNode.onloadedmetadata = function() { if(videoNode.duration < 25) playbackTimeoutLimit = videoNode.duration * 1000; };
            }

            let elapsedCounter = 0;
            const intervalTickRate = 50; 
            clearInterval(progressAnimationInterval);
            progressAnimationInterval = setInterval(() => {
                if (isViewerPaused) return;
                elapsedCounter += intervalTickRate;
                const calculatedPercentage = (elapsedCounter / playbackTimeoutLimit) * 100;
                progressBar.style.width = Math.min(calculatedPercentage, 100) + "%";
                if(elapsedCounter >= playbackTimeoutLimit) { clearInterval(progressAnimationInterval); currentSlideIndex++; playSlideshow(); }
            }, intervalTickRate);
        }

        window.deleteCurrentStatus = function() {
            if(confirm("Are you sure you want to delete this status?")) {
                currentViewingStory.slides.splice(currentSlideIndex, 1);
                syncToDatabase();
                if (currentViewingStory.slides.length === 0) closeStatusViewer();
                else { if(currentSlideIndex >= currentViewingStory.slides.length) currentSlideIndex = currentViewingStory.slides.length - 1; playSlideshow(); }
            }
        }

        window.showViewers = function() { isViewerPaused = true; const slide = currentViewingStory.slides[currentSlideIndex]; const listContent = document.getElementById('viewers-list-content'); if (slide.viewedBy.length === 0) listContent.innerHTML = `<div style="color:var(--text-muted);font-size:13px;text-align:center;">No views yet.</div>`; else listContent.innerHTML = slide.viewedBy.map(v => { const vTick = v.hasRedTick || v.redTick ? '<svg viewBox="0 0 24 24" class="red-tick-svg" style="width:14px;height:14px;" title="Verified"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''; return `<div class="viewer-item"><img src="${v.avatar}"><span style="display:flex;align-items:center;">@${v.username}${vTick}</span></div>`; }).join(''); document.getElementById('viewers-list-panel').style.display = 'block'; }
        window.hideViewers = function() { document.getElementById('viewers-list-panel').style.display = 'none'; isViewerPaused = false; }
        async function syncToDatabase() { if(!currentViewingStory) return; const userDocRef = window.doc(window.doc(window.db, "status_stories", currentViewingStory.uid); try { if (currentViewingStory.slides.length === 0) await window.deleteDoc(userDocRef); else await window.setDoc(userDocRef, currentViewingStory); } catch(e) { console.error("Error updating story state:", e); } }
        window.closeStatusViewer = function() { document.getElementById('status-player-modal').style.display = 'none'; document.getElementById('viewers-list-panel').style.display = 'none'; document.getElementById('viewer-body-render').innerHTML = ""; clearInterval(progressAnimationInterval); clearTimeout(storyPlaybackTimer); currentViewingStory = null; }

        // ==========================================
        // NEW CONNECT & CHAT SYSTEM LOGIC
        // ==========================================
        
        let activeChatId = null;
        let activeChatTarget = null;
        let unsubscribeMessages = null;
        let allUsersCache = [];
        window.lastInboxChats = []; // Dynamic storage global variable to track items for updates

        window.initChatSystem = function() {
            // Listen to incoming chats for inbox
            const chatsRef = window.collection(window.db, "chats");
            window.onSnapshot(chatsRef, (snapshot) => {
                let myChats = [];
                let totalUnread = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.participants && data.participants.includes(window.currentUserProfile.uid)) {
                        data.id = doc.id;
                        myChats.push(data);
                        if(data.lastSender !== window.currentUserProfile.uid && !data.seen) {
                            totalUnread++;
                        }
                    }
                });
                // Update global badge
                const badge = document.getElementById('global-unread-badge');
                if(totalUnread > 0) { badge.style.display = 'block'; badge.innerText = totalUnread; }
                else { badge.style.display = 'none'; }
                
                renderInbox(myChats);
                
                // Real-time listen for calls
                listenForCalls();
            });

            // Fetch all users for search
            window.getDoc(window.doc(window.db, "meta", "dummy")).catch(async () => {
                window.onSnapshot(window.collection(window.db, "users"), (snap) => {
                    allUsersCache = [];
                    snap.forEach(d => { if(d.id !== window.currentUserProfile.uid) allUsersCache.push({...d.data(), uid: d.id}); });
                    if(window.lastInboxChats.length > 0) renderInbox(window.lastInboxChats);
                });
            });
        }

        window.openChatMainModal = function() { document.getElementById('chat-main-modal').style.display = 'flex'; if(window.lastInboxChats.length > 0) renderInbox(window.lastInboxChats); }
        window.closeChatMainModal = function() { document.getElementById('chat-main-modal').style.display = 'none'; document.getElementById('chat-user-search').value = ""; }

        window.handleUserSearch = function() {
            const val = document.getElementById('chat-user-search').value.toLowerCase();
            const list = document.getElementById('chat-inbox-list');
            if(!val) { renderInbox(window.lastInboxChats); return; }
            
            const results = allUsersCache.filter(u => u.username && u.username.toLowerCase().includes(val));
            list.innerHTML = results.map(u => {
                const tick = (u.hasRedTick || u.redTick) ? `<svg class="red-tick-svg" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                return `
                <div class="chat-user-item">
                    <img src="${u.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                    <div>
                        <div style="font-weight:bold; display:flex; align-items:center;">@${u.username}${tick}</div>
                    </div>
                    <button class="connect-btn" onclick='connectUser("${u.uid}", "${u.username}", "${u.pic}", ${u.hasRedTick||u.redTick||false})'>Connect</button>
                </div>`;
            }).join('');
        }

        function renderInbox(chats) {
            const list = document.getElementById('chat-inbox-list');
            if(!list || document.getElementById('chat-user-search').value.trim() !== "") return; 
            if(chats.length === 0) { list.innerHTML = "<div style='color:var(--text-muted);text-align:center;'>No active chats yet.</div>"; return; }
            
            window.lastInboxChats = chats;
            chats.sort((a,b) => b.lastUpdated - a.lastUpdated);
            
            let localProfiles = JSON.parse(localStorage.getItem('thejaya_chat_users_cache') || '{}');
            
            list.innerHTML = chats.map(c => {
                const isUnread = (c.lastSender !== window.currentUserProfile.uid && !c.seen);
                const otherUid = c.participants.find(p => p !== window.currentUserProfile.uid);
                
                let otherUser = allUsersCache.find(u => u.uid === otherUid) || localProfiles[otherUid];
                
                if(!otherUser) {
                    otherUser = {username: "User", pic: "https://cdn-icons-png.flaticon.com/512/149/149071.png", hasRedTick: false, redTick: false};
                    // Dynamic Profile Tracker Fallback
                    window.getDoc(window.doc(window.db, "users", otherUid)).then(snap => {
                        if(snap.exists()) {
                            const uData = snap.data();
                            const cacheObj = {
                                uid: otherUid,
                                username: uData.username || "User",
                                pic: uData.pic || uData.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                                hasRedTick: uData.hasRedTick || uData.redTick || uData.verified || false,
                                redTick: uData.hasRedTick || uData.redTick || uData.verified || false
                            };
                            let currentCache = JSON.parse(localStorage.getItem('thejaya_chat_users_cache') || '{}');
                            currentCache[otherUid] = cacheObj;
                            localStorage.setItem('thejaya_chat_users_cache', JSON.stringify(currentCache));
                            if(document.getElementById('chat-user-search').value.trim() === "") {
                                renderInbox(window.lastInboxChats);
                            }
                        }
                    }).catch(e => console.error("Error routing missing profile:", e));
                } else {
                    if (!localProfiles[otherUid] && allUsersCache.find(u => u.uid === otherUid)) {
                        localProfiles[otherUid] = {
                            uid: otherUid, username: otherUser.username, pic: otherUser.pic,
                            hasRedTick: otherUser.hasRedTick || otherUser.redTick || false,
                            redTick: otherUser.hasRedTick || otherUser.redTick || false
                        };
                        localStorage.setItem('thejaya_chat_users_cache', JSON.stringify(localProfiles));
                    }
                }

                const tick = (otherUser.hasRedTick || otherUser.redTick) ? `<svg class="red-tick-svg" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                const unreadIndicatorStyle = isUnread ? 'border: 1px solid var(--primary); box-shadow: 0 0 10px rgba(0, 229, 255, 0.25);' : '';
                
                return `
                <div class="chat-user-item" style="${unreadIndicatorStyle}" onclick='openChatRoom("${c.id}", "${otherUid}", "${otherUser.username}", "${otherUser.pic}", ${otherUser.hasRedTick||otherUser.redTick||false})'>
                    <img src="${otherUser.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                    <div style="flex:1;">
                        <div style="font-weight:bold; display:flex; align-items:center;">@${otherUser.username}${tick}</div>
                        <div style="font-size:12px; color: ${isUnread ? 'var(--primary)' : 'var(--text-muted)'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${c.lastMessage || 'Connected'}
                        </div>
                    </div>
                    ${isUnread ? '<div style="width:12px;height:12px;border-radius:50%;background:var(--primary);box-shadow: 0 0 10px var(--primary);"></div>' : ''}
                </div>`;
            }).join('');
        }

        window.connectUser = async function(uid, username, pic, redTick) {
            let localProfiles = JSON.parse(localStorage.getItem('thejaya_chat_users_cache') || '{}');
            localProfiles[uid] = { uid, username, pic, hasRedTick: redTick, redTick: redTick };
            localStorage.setItem('thejaya_chat_users_cache', JSON.stringify(localProfiles));

            const chatId = window.currentUserProfile.uid < uid ? `${window.currentUserProfile.uid}_${uid}` : `${uid}_${window.currentUserProfile.uid}`;
            const chatRef = window.doc(window.db, "chats", chatId);
            const snap = await window.getDoc(chatRef);
            if(!snap.exists()) {
                await window.setDoc(chatRef, {
                    participants: [window.currentUserProfile.uid, uid],
                    lastMessage: "Connected",
                    lastSender: window.currentUserProfile.uid,
                    lastUpdated: Date.now(),
                    seen: true
                });
            }
            openChatRoom(chatId, uid, username, pic, redTick);
        }

        window.openChatRoom = function(chatId, targetUid, username, pic, redTick) {
            activeChatId = chatId;
            activeChatTarget = { uid: targetUid, username, pic, redTick };
            
            document.getElementById('chat-target-avatar').src = pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const tickHtml = redTick ? `<svg class="red-tick-svg" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
            document.getElementById('chat-target-username-container').innerHTML = `@${username}${tickHtml}`;
            
            document.getElementById('active-chat-room').style.display = 'flex';
            
            // Mark chat as seen
            window.updateDoc(window.doc(window.db, "chats", chatId), { seen: true });

            // Listen to messages
            const q = window.query(window.collection(window.db, `chats/${chatId}/messages`));
            unsubscribeMessages = window.onSnapshot(q, (snapshot) => {
                let msgs = [];
                snapshot.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                msgs.sort((a,b) => a.timestamp - b.timestamp);
                renderMessages(msgs);
            });
        }

        window.closeActiveChat = function() {
            document.getElementById('active-chat-room').style.display = 'none';
            if(unsubscribeMessages) unsubscribeMessages();
            activeChatId = null;
            activeChatTarget = null;
            if(window.lastInboxChats.length > 0) renderInbox(window.lastInboxChats);
        }

        function renderMessages(msgs) {
            const feed = document.getElementById('chat-messages-feed');
            feed.innerHTML = msgs.map(m => {
                if(m.deletedFor && m.deletedFor.includes(window.currentUserProfile.uid)) return '';
                
                const isMe = m.sender === window.currentUserProfile.uid;
                const time = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const canEdit = isMe && (Date.now() - m.timestamp < 600000) && m.type === 'text'; // 10 mins limit
                
                let contentHtml = '';
                if(m.type === 'image') {
                    contentHtml = `<img src="${m.text}" class="msg-image"><br><a href="${m.text}" download="Thejaya_Image.jpg" class="download-btn">Download</a>`;
                } else {
                    contentHtml = `<span>${m.text}</span>`;
                }

                return `
                <div class="msg-bubble ${isMe ? 'sent' : 'received'}">
                    ${contentHtml}
                    <div class="msg-meta">
                        ${m.edited ? '<span class="msg-edited-tag">(edited)</span>' : ''}
                        <span>${time}</span>
                        ${isMe ? `<span style="color:${m.seen ? '#00e5ff' : '#888'}">✓✓</span>` : ''}
                    </div>
                    <div class="msg-options">
                        <span onclick="triggerMsgOptions('${m.id}', ${canEdit})">⋮</span>
                    </div>
                </div>`;
            }).join('');
            feed.scrollTop = feed.scrollHeight;
            
            // Mark last message seen if not me
            if(msgs.length > 0) {
                const last = msgs[msgs.length-1];
                if(last.sender !== window.currentUserProfile.uid && !last.seen) {
                    window.updateDoc(window.doc(window.db, `chats/${activeChatId}/messages`, last.id), { seen: true });
                }
            }
        }

        window.sendChatMessage = async function() {
            const inp = document.getElementById('chat-msg-input');
            const text = inp.value.trim();
            if(!text || !activeChatId) return;
            inp.value = "";
            
            const msgRef = window.collection(window.db, `chats/${activeChatId}/messages`);
            await window.addDoc(msgRef, {
                sender: window.currentUserProfile.uid,
                text: text,
                type: 'text',
                timestamp: Date.now(),
                seen: false
            });
            window.updateDoc(window.doc(window.db, "chats", activeChatId), {
                lastMessage: text, lastSender: window.currentUserProfile.uid, lastUpdated: Date.now(), seen: false
            });
        }

        window.sendChatImage = async function(input) {
            if(!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const base64 = await compressImage(file); 
            
            const msgRef = window.collection(window.db, `chats/${activeChatId}/messages`);
            await window.addDoc(msgRef, {
                sender: window.currentUserProfile.uid,
                text: base64,
                type: 'image',
                timestamp: Date.now(),
                seen: false
            });
            window.updateDoc(window.doc(window.db, "chats", activeChatId), {
                lastMessage: "📷 Image", lastSender: window.currentUserProfile.uid, lastUpdated: Date.now(), seen: false
            });
            input.value = "";
        }

        window.triggerMsgOptions = function(msgId, canEdit) {
            let actions = "Choose Action:\n1. Delete for Me\n2. Delete for Everyone";
            if(canEdit) actions += "\n3. Edit (Text only within 10 mins)";
            
            const choice = prompt(actions);
            if(choice == "1") {
                const msgDocRef = window.doc(window.db, `chats/${activeChatId}/messages`, msgId);
                window.getDoc(msgDocRef).then(snap => {
                    if(snap.exists()) {
                        let currentDeletedFor = snap.data().deletedFor || [];
                        if(!currentDeletedFor.includes(window.currentUserProfile.uid)) {
                            currentDeletedFor.push(window.currentUserProfile.uid);
                            window.updateDoc(msgDocRef, { deletedFor: currentDeletedFor });
                        }
                    }
                }).catch(e => console.error(e));
            } else if(choice == "2") {
                window.deleteDoc(window.doc(window.db, `chats/${activeChatId}/messages`, msgId)).then(() => {
                    window.updateDoc(window.doc(window.db, "chats", activeChatId), {
                        lastMessage: "🗑️ Message deleted"
                    }).catch(e => {});
                });
            } else if(choice == "3" && canEdit) {
                const newText = prompt("Enter new message:");
                if(newText && newText.trim() !== "") {
                    window.updateDoc(window.doc(window.db, `chats/${activeChatId}/messages`, msgId), {
                        text: newText.trim(), edited: true
                    }).then(() => {
                        window.updateDoc(window.doc(window.db, "chats", activeChatId), {
                            lastMessage: newText.trim()
                        }).catch(e => {});
                    });
                }
            }
        }

        // ==========================================
        // CALLING SYSTEM (WEBRTC SIGNALING OUTLINE)
        // ==========================================
        let localStream = null;
        let peerConnection = null;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        window.initiateCall = async function(type) {
            if(!activeChatTarget) return;
            document.getElementById('call-screen-modal').style.display = 'flex';
            document.getElementById('call-username').innerText = activeChatTarget.username;
            document.getElementById('call-avatar').src = activeChatTarget.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('call-status-text').innerText = "Ringing...";
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
                document.getElementById('local-video').srcObject = localStream;
                
                // Signal to DB
                const callDoc = window.doc(window.db, "calls", activeChatTarget.uid);
                await window.setDoc(callDoc, {
                    caller: window.currentUserProfile.uid,
                    callerName: window.currentUserProfile.username,
                    callerPic: window.currentUserProfile.pic,
                    type: type,
                    status: 'ringing',
                    timestamp: Date.now()
                });

                // Listen for answer
                window.onSnapshot(callDoc, (doc) => {
                    if(doc.exists() && doc.data().status === 'answered') {
                        document.getElementById('call-status-text').innerText = "Connected";
                    } else if (!doc.exists() || doc.data().status === 'ended') {
                        endCall(false);
                    }
                });
            } catch(e) { alert("Microphone/Camera access denied!"); endCall(); }
        }

        function listenForCalls() {
            const myCallDoc = window.doc(window.db, "calls", window.currentUserProfile.uid);
            window.onSnapshot(myCallDoc, (doc) => {
                if(doc.exists() && doc.data().status === 'ringing') {
                    const data = doc.data();
                    if(Date.now() - data.timestamp > 60000) { window.deleteDoc(myCallDoc); return; }
                    document.getElementById('incoming-call-alert').style.display = 'flex';
                    document.getElementById('incoming-caller-avatar').src = data.callerPic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    document.getElementById('incoming-caller-name').innerText = "@" + data.callerName;
                } else {
                    document.getElementById('incoming-call-alert').style.display = 'none';
                }
            });
        }

        window.answerCall = async function() {
            document.getElementById('incoming-call-alert').style.display = 'none';
            document.getElementById('call-screen-modal').style.display = 'flex';
            document.getElementById('call-status-text').innerText = "Connected";
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                window.updateDoc(window.doc(window.db, "calls", window.currentUserProfile.uid), { status: 'answered' });
            } catch(e) { alert("Device access denied"); endCall(); }
        }

        window.endCall = function(updateDb = true) {
            document.getElementById('call-screen-modal').style.display = 'none';
            document.getElementById('incoming-call-alert').style.display = 'none';
            if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if(peerConnection) { peerConnection.close(); peerConnection = null; }
            
            if(updateDb) {
                window.deleteDoc(window.doc(window.db, "calls", window.currentUserProfile.uid)).catch(e=>{});
                if(activeChatTarget) window.deleteDoc(window.doc(window.db, "calls", activeChatTarget.uid)).catch(e=>{});
            }
        }

        window.toggleSpeaker = function() {
            const btn = document.getElementById('speaker-btn');
            const video = document.getElementById('remote-video');
            btn.classList.toggle('active');
            if(video.volume > 0) video.volume = 1; 
        }

    </script>
</body>
</html>
