<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <style>
        /* --- PURANA CSS AUR NAYA RED TICK CSS --- */
        :root { 
            --primary: #00e5ff; --bg: #030a1a; --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; --text-muted: #8a99b3; --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.1); margin-bottom: 20px; backdrop-filter: blur(10px); }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Red Tick Style */
        .red-tick { color: var(--red); margin-left: 5px; font-weight: bold; font-size: 14px; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--red); }
        input:checked + .slider:before { transform: translateX(23px); }

        /* Loader Fix */
        #loader-screen { position: fixed; inset: 0; background: #030a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        
        input, textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: #fff; box-sizing: border-box; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <h1 style="color:var(--primary)">The Jaya</h1>
        <p>Loading Experience...</p>
    </div>

    <div id="main-app" style="display:none;">
        <header style="padding: 15px 20px; border-bottom: 1px solid rgba(0,229,255,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card-bg); backdrop-filter: blur(10px);">
            <div style="font-size: 24px; font-weight: 800; color: var(--primary);">The Jaya</div>
            <img id="head-pic" src="" style="width:40px; height:40px; border-radius:50%; cursor:pointer; border:2px solid var(--primary);" onclick="navTo('profile')">
        </header>

        <div class="container" style="max-width: 500px; margin: 20px auto; width: 95%;">
            <div id="home-view"><div id="feed"></div></div>

            <div id="profile-view" style="display:none;" class="card">
                <div style="text-align: center;">
                    <img id="u-img" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); object-fit: cover;">
                    <h2 id="u-display-name"></h2>
                    
                    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin: 20px 0; text-align: left;">
                        <h4 style="margin: 0 0 10px 0; color: var(--red);">Account Verification</h4>
                        <input type="text" id="verify-user" readonly style="opacity: 0.6;">
                        <input type="email" id="verify-email" placeholder="Confirm Email">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                            <span>Enable Red Tick</span>
                            <label class="switch">
                                <input type="checkbox" id="verify-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn-primary" onclick="saveVerification()" style="background: var(--red); margin-top: 15px;">Update Status</button>
                    </div>

                    <button onclick="navTo('home')" style="background:transparent; color:var(--text-muted); border:none; cursor:pointer;">Back to Feed</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, updateDoc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            projectId: "the-jaya-by-ree",
        };
        
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserData = null;

        const redTick = `<span class="red-tick">✔</span>`;

        // Wait for Loader
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; }, 2000);
        });

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if(user) {
                // Realtime User Data (for Red Tick status)
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    currentUserData = d.data();
                    updateProfileUI();
                });
                loadFeed();
            }
        });

        function updateProfileUI() {
            if(!currentUserData) return;
            document.getElementById('head-pic').src = auth.currentUser.photoURL;
            document.getElementById('u-img').src = auth.currentUser.photoURL;
            document.getElementById('u-display-name').innerHTML = `@${currentUserData.username} ${currentUserData.isVerified ? redTick : ''}`;
            document.getElementById('verify-user').value = `@${currentUserData.username}`;
            document.getElementById('verify-email').value = auth.currentUser.email;
            document.getElementById('verify-toggle').checked = currentUserData.isVerified || false;
        }

        window.saveVerification = async () => {
            const isChecked = document.getElementById('verify-toggle').checked;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { isVerified: isChecked });
            alert("Verification status updated realtime!");
        };

        window.navTo = (view) => {
            document.getElementById('home-view').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = view === 'profile' ? 'block' : 'none';
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snapshot.forEach(async (postDoc) => {
                    const p = postDoc.data();
                    // Note: In real app, you'd fetch user status for each post. 
                    // To keep it simple & fast, we'll assume the post data has a snapshot or fetch logic.
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${p.pic}" style="width:35px; height:35px; border-radius:50%;">
                            <strong>@${p.username} ${p.isVerified ? redTick : ''}</strong>
                        </div>
                        <p>${p.text}</p>
                    `;
                    feed.appendChild(el);
                });
            });
        }
    </script>
</body>
</html>
