<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">

    <style>
        /* --- MIXED OPTIMIZED STYLES --- */
        @media (min-width: 768px) {
            .container { max-width: 700px; margin: 30px auto; }
            header { padding: 15px 10%; }
            .logo { font-size: 28px; }
            .card { padding: 25px; border-radius: 24px; transition: transform 0.2s ease; }
            .card:hover { border-color: var(--primary); }
            input, textarea { font-size: 16px; }
            .fab { right: 50px; bottom: 50px; width: 70px; height: 70px; }
            .p-pic { width: 50px; height: 50px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
            #post-modal .container { max-width: 600px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--primary); }

        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --star: #ffd700; 
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary: #008ad3;
            --neon-shadow: 0 4px 12px rgba(0, 138, 211, 0.2);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 100px; 
            overflow-x: hidden; 
            transition: background 0.3s ease;
        }

        header { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; text-shadow: var(--neon-shadow); }
        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.1); 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card p { overflow-wrap: break-word; word-break: break-word; white-space: pre-wrap; margin: 10px 0; }

        input, textarea { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
        }

        /* Red Tick Styling */
        .red-tick { width: 16px; height: 16px; fill: var(--red); margin-left: 4px; vertical-align: middle; }
        .verify-card { border: 1px solid var(--red); background: rgba(255, 68, 68, 0.05); margin-top: 20px; padding: 15px; border-radius: 15px; text-align: left; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--red); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; box-shadow: var(--neon-shadow); }
        
        .fab { position: fixed; bottom: 35px; right: 25px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--neon-shadow); z-index: 2000; cursor: pointer; }
        
        .bits-btn {
            position: fixed; bottom: 110px; right: 32px; width: 45px; height: 45px; background: var(--card-bg); border: 1px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); box-shadow: var(--neon-shadow); z-index: 2000; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; transition: 0.3s;
        }

        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #1c1e21; }
        
        /* Action Bar (Stars, Comments, Share) */
        .action-bar { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px; }
        .action-btn { background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .action-btn:hover { color: var(--primary); }
        .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .comment-drawer { display: none; margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-card { background: rgba(0, 229, 255, 0.05); padding: 15px; border-radius: 18px; border: 1px solid var(--primary); text-align: center; }
        .stat-val { display: block; font-size: 28px; font-weight: 800; color: var(--primary); }

        /* Loader Animation */
        #loader-screen { position: fixed; inset: 0; background: #030a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loader-visual { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .planet { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 40px var(--primary); animation: pulse 2s infinite; }
        .orbit { position: absolute; width: 100px; height: 100px; border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 50%; animation: spin 3s linear infinite; }
        .progress-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); animation: loadFill 2.5s forwards; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes loadFill { 100% { width: 100%; } }

        #search-row { display: none; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-visual"><div class="planet"></div><div class="orbit"></div></div>
        <div class="loading-text"><h1 class="logo">The Jaya</h1><div class="progress-bar"><div class="progress-fill"></div></div></div>
    </div>

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">The Jaya</h1>
        <button id="googleLogin" class="btn-primary" style="background:#fff; color:#000; width:auto; padding:12px 30px; margin-top:30px; display:flex; align-items:center; gap:10px; margin-left:auto; margin-right:auto;"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Login with Google</button>
        <p id="guest-trigger" style="color:var(--primary); margin-top:20px; cursor:pointer; text-decoration:underline;">Continue as Guest</p>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo" onclick="navTo('home')">The Jaya</div>
            <div style="display:flex; align-items:center; gap:18px;">
                <span onclick="requireLogin(toggleSearch)" style="cursor:pointer; display: flex; color: var(--text-muted);">
                    <svg viewBox="0 0 24 24"><path d="M21.71 20.29l-1.42 1.42a1 1 0 01-1.42 0l-4.52-4.52A7.89 7.89 0 019 19a8 8 0 118-8 7.89 7.89 0 01-1.81 4.35l4.52 4.52a1 1 0 010 1.42zM4 11a7 7 0 1014 0 7 7 0 00-14 0z"/></svg>
                </span>
                <img id="head-pic" src="" class="p-pic" onclick="requireLogin(() => navTo('profile', true))" style="cursor:pointer; border:2px solid var(--primary);">
            </div>
        </header>

        <div id="search-row">
            <div style="display:flex; gap:10px;"><input type="text" id="sq" placeholder="Search @username..."><button onclick="findUser()" class="btn-primary" style="width: auto;">Go</button></div>
        </div>

        <div class="container">
            <div id="home-view"><div id="feed"></div></div>
            <div id="profile-view" style="display:none;" class="card">
                <div style="text-align:center;">
                    <img id="u-img" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                    <h2 id="u-name" style="margin:15px 0;">@username</h2>
                    
                    <div class="verify-card" id="verify-section" style="display:none;">
                        <p style="margin:0 0 10px 0; font-weight:bold; color:var(--red);">Red Tick Verification</p>
                        <input type="text" id="v-uname" placeholder="Confirm Username" style="margin-bottom:8px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <span>Enable Red Tick</span>
                            <label class="switch">
                                <input type="checkbox" id="tick-switch" onchange="handleTickToggle()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card"><span id="s-stars" class="stat-val">0</span><small>Stars</small></div>
                        <div class="stat-card"><span id="s-posts" class="stat-val">0</span><small>Posts</small></div>
                    </div>

                    <div id="my-controls" style="display:none;">
                        <button onclick="toggleTheme()" style="background:rgba(255,255,255,0.1); color:var(--text-main); width:100%; margin-bottom:10px; border:1px solid var(--primary);">Toggle Mode</button>
                        <button onclick="checkEditUsername()" style="background:rgba(255,255,255,0.1); color:var(--text-main); width:100%; margin-bottom:10px; border:1px solid rgba(255,255,255,0.2);">Edit Username</button>
                        <button onclick="logout()" style="background:var(--red); color:white; width:100%;">Logout</button>
                    </div>
                    <button onclick="navTo('home')" style="background:#444; color:white; width:100%; margin-top:10px;">Back</button>
                </div>
                <div id="u-feed"></div>
            </div>
        </div>

        <a href="thejayabit.html" class="bits-btn">Bits</a>
        <div id="fab-btn" class="fab" onclick="requireLogin(() => setPostModal(true))">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <h3>New Post</h3>
            <textarea id="postInput" rows="5" placeholder="What's happening?"></textarea>
            <p id="word-count" style="font-size: 12px; color: var(--text-muted); text-align: right;">0 / 110</p>
            <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;">
                <button class="btn-primary" onclick="doPost()" style="flex:1;">Post Now</button>
                <button onclick="pasteText()" style="background:var(--card-bg); color:var(--primary); border:1px solid var(--primary);">Paste</button>
                <button onclick="setPostModal(false)" style="background:#444; color:#fff;">Cancel</button>
                <a href="https://quote-bot--ambujewns404.replit.app" target="_blank" style="width:100%;"><button style="background:rgba(0, 229, 255, 0.1); color:var(--primary); border:1px solid var(--primary); width:100%;">✨ AI Notes</button></a>
            </div>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, deleteDoc, getDoc, setDoc, where, getDocs, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            projectId: "the-jaya-by-ree"
        };
        
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProv = new GoogleAuthProvider();
        const defaultAvtr = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        const redTickSVG = `<svg class="red-tick" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;

        let me = null;
        let userCache = {};

        // Loader Timer
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader-screen').style.display = 'none'; }, 2800);
        });

        // Auth Listener
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                onSnapshot(doc(db, "users", u.uid), (snap) => {
                    if(snap.exists()) {
                        me = snap.data();
                        document.getElementById('main-app').style.display = 'block';
                        document.getElementById('auth-section').style.display = 'none';
                        document.getElementById('head-pic').src = me.pic || defaultAvtr;
                        document.getElementById('tick-switch').checked = me.isVerified || false;
                    } else {
                        const un = u.displayName.replace(/\s+/g,'').toLowerCase() + Math.floor(Math.random()*99);
                        setDoc(doc(db, "users", u.uid), { username: un, uid: u.uid, pic: u.photoURL, isVerified: false, lastChange: Date.now() });
                    }
                });
                loadFeed("feed", null);
            } else {
                document.getElementById('auth-section').style.display = 'block';
            }
        });

        function watchUser(uid) {
            if (!userCache[uid]) {
                onSnapshot(doc(db, "users", uid), (snap) => {
                    if (snap.exists()) {
                        userCache[uid] = snap.data();
                        const tick = userCache[uid].isVerified ? redTickSVG : '';
                        document.querySelectorAll(`.uname-${uid}`).forEach(el => {
                            el.innerHTML = `@${userCache[uid].username} ${tick}`;
                        });
                    }
                });
            }
        }

        window.loadFeed = (divId, uid) => {
            let q = uid ? query(collection(db, "posts"), where("uid", "==", uid), orderBy("time", "desc")) 
                        : query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById(divId); div.innerHTML = "";
                let stars = 0, posts = 0;
                s.forEach(d => {
                    const p = d.data();
                    if(uid) { stars += (p.stars?.length || 0); posts++; }
                    watchUser(p.uid);
                    
                    const isStarred = auth.currentUser ? p.stars?.includes(auth.currentUser.uid) : false;
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                            <img src="${p.pic || defaultAvtr}" class="p-pic">
                            <div class="user-info">
                                <strong class="uname-${p.uid}" onclick="navTo('profile', false, '${p.uid}')" style="cursor:pointer;">@${p.username}</strong>
                                <div style="font-size:11px; color:var(--text-muted);">${timeAgo(p.time)}</div>
                            </div>
                            ${(auth.currentUser && auth.currentUser.uid === p.uid) ? `<div onclick="delPost('${d.id}')" style="margin-left:auto; cursor:pointer;"><svg style="fill:var(--red); width:18px;" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>` : ''}
                        </div>
                        <p>${p.text}</p>
                        <div class="action-bar">
                             <span class="action-btn" onclick="starIt('${d.id}', ${isStarred})" style="color:${isStarred?'var(--star)':''}">
                                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                ${p.stars?.length || 0}
                             </span>
                             <span class="action-btn" onclick="requireLogin(() => toggleComs('${d.id}'))">
                                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/></svg>
                                ${p.comments?.length || 0}
                             </span>
                             <span class="action-btn" onclick="sharePost('${p.text.replace(/'/g, "\\'")}', '${p.username}')">
                                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                                Share
                             </span>
                        </div>
                        <div id="drawer-${d.id}" class="comment-drawer">
                            <div id="list-${d.id}">${(p.comments || []).map((c, i) => `<div style="font-size:13px; margin-bottom:8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom:4px;"><b>@${c.user}</b>: ${c.msg}</div>`).join('')}</div>
                            <div style="display:flex; gap:8px; margin-top:10px;">
                                <input id="in-${d.id}" placeholder="Write a reply..."><button onclick="addCom('${d.id}')" class="btn-primary" style="width:auto;">Go</button>
                            </div>
                        </div>
                    `;
                    div.appendChild(el);
                });
                if(uid) { document.getElementById('s-stars').innerText = stars; document.getElementById('s-posts').innerText = posts; }
            });
        };

        window.starIt = async (id, has) => { 
            if(!auth.currentUser) return;
            await updateDoc(doc(db, "posts", id), { stars: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) }); 
        };

        window.addCom = async (id) => {
            const i = document.getElementById('in-'+id);
            if(!i.value.trim()) return;
            await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: auth.currentUser.uid, user: me.username, msg: i.value }) });
            i.value = "";
        };

        window.sharePost = (text, user) => {
            const str = `"${text}"\n\n~by @${user} on The Jaya`;
            if(navigator.share) {
                navigator.share({ text: str, url: window.location.href });
            } else {
                navigator.clipboard.writeText(str + "\n" + window.location.href);
                alert("Link & Text copied!");
            }
        };

        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { text: t, username: me.username, pic: auth.currentUser.photoURL, uid: auth.currentUser.uid, stars: [], comments: [], time: Date.now() });
            setPostModal(false); document.getElementById('postInput').value = "";
        };

        window.delPost = async (id) => { if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id)); };

        // Profile & Red Tick Logic
        window.handleTickToggle = async () => {
            const isChecked = document.getElementById('tick-switch').checked;
            if(document.getElementById('v-uname').value !== me.username) {
                alert("Username mismatch!");
                document.getElementById('tick-switch').checked = !isChecked;
                return;
            }
            await updateDoc(doc(db, "users", me.uid), { isVerified: isChecked });
        };

        window.navTo = (v, isMe, otherId) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            if(v === 'profile') {
                const targetUid = isMe ? auth.currentUser.uid : otherId;
                document.getElementById('verify-section').style.display = isMe ? 'block' : 'none';
                document.getElementById('my-controls').style.display = isMe ? 'block' : 'none';
                getDoc(doc(db, "users", targetUid)).then(snap => {
                    const u = snap.data();
                    document.getElementById('u-img').src = u.pic || defaultAvtr;
                    document.getElementById('u-name').innerHTML = `@${u.username} ${u.isVerified ? redTickSVG : ''}`;
                    loadFeed("u-feed", targetUid);
                });
            }
        };

        window.findUser = async () => {
            const qStr = document.getElementById('sq').value.toLowerCase().trim();
            const s = await getDocs(query(collection(db, "users"), where("username", "==", qStr)));
            if(!s.empty) navTo('profile', false, s.docs[0].data().uid); else alert("Not found");
        };

        // Word Limit Logic
        const postInput = document.getElementById('postInput');
        const wordCountDisplay = document.getElementById('word-count');
        postInput.oninput = () => {
            const words = postInput.value.match(/\S+/g) || [];
            if(words.length > 110) postInput.value = postInput.value.split(/\s+/).slice(0, 110).join(' ');
            wordCountDisplay.innerText = `${words.length} / 110`;
            wordCountDisplay.style.color = words.length >= 110 ? "var(--red)" : "var(--text-muted)";
        };

        const timeAgo = (t) => { const d = Date.now()-t, m = Math.floor(d/60000); return m<1?"Now":m<60?m+"m":Math.floor(m/60)+"h"; };
        window.requireLogin = (cb) => auth.currentUser ? cb() : alert("Login required!");
        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        window.toggleSearch = () => { const r = document.getElementById('search-row'); r.style.display = r.style.display==='block'?'none':'block'; };
        window.toggleComs = (id) => { const d = document.getElementById('drawer-'+id); d.style.display = d.style.display==='block'?'none':'block'; };
        window.toggleTheme = () => document.body.classList.toggle('light-mode');
        window.pasteText = async () => document.getElementById('postInput').value += await navigator.clipboard.readText();
        window.logout = () => signOut(auth).then(() => location.reload());
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, gProv);
        document.getElementById('guest-trigger').onclick = () => { document.getElementById('auth-section').style.display='none'; document.getElementById('main-app').style.display='block'; loadFeed("feed", null); };

    </script>
</body>
</html>
