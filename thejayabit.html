<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya Bits</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: 'Arial', sans-serif; color: white; overflow: hidden; }

        .app-header {
            position: fixed;
            top: 0; width: 100%; text-align: center;
            padding: 20px; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
        }

        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-card {
            position: relative;
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: auto; /* Essential for interaction */
        }

        iframe {
            width: 100%;
            height: 100%;
            /* Zoom to remove black bars for vertical view */
            transform: scale(1.6); 
            border: none;
        }

        .overlay-info {
            position: absolute;
            bottom: 80px; left: 20px;
            z-index: 10; max-width: 85%;
            pointer-events: none;
        }

        .overlay-info h3 { font-size: 0.9rem; text-shadow: 2px 2px 4px rgba(0,0,0,1); margin-bottom: 5px; }
        .overlay-info span { color: #ff0050; font-weight: bold; }

        #loader {
            position: fixed; bottom: 20px; width: 100%;
            text-align: center; display: none; z-index: 1000; font-size: 12px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>The Jaya Bits</h1>
    </header>

    <div class="reels-container" id="reelsContainer"></div>
    <div id="loader">Loading more bits...</div>

    <script>
        // Use of the specified API Key for web development projects
        const API_KEY = 'AIzaSyDudljWyHUaPhUW1Ux3NeSHZQkRU1fVFcc'; 
        const container = document.getElementById('reelsContainer');
        const loader = document.getElementById('loader');
        
        let nextPageToken = '';
        let isFetching = false;

        async function fetchVideos(pageToken = '') {
            if (isFetching) return;
            isFetching = true;
            loader.style.display = 'block';

            try {
                // Fetching content for visual creator focus
                // Yaha hum 'videoCategoryId=42' (Shorts/Videos) ya general popular fetch kar rahe hain
                const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,status&chart=mostPopular&maxResults=10&key=${API_KEY}&pageToken=${pageToken}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items) {
                    nextPageToken = data.nextPageToken; 
                    // Filter out videos that don't allow embedding
                    const embeddableVideos = data.items.filter(v => v.status.embeddable !== false);
                    renderReels(embeddableVideos);
                }
            } catch (error) {
                console.error("API Error:", error);
            } finally {
                isFetching = false;
                loader.style.display = 'none';
            }
        }

        function renderReels(videos) {
            videos.forEach((video) => {
                const id = video.id;
                const title = video.snippet.title;
                
                const reel = document.createElement('div');
                reel.classList.add('reel-card');
                
                // key fix: 'mute=1' and 'autoplay=1' are mandatory for web reels
                // Origin and widget_referrer add security and help with embed restrictions
                reel.innerHTML = `
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}&enablejsapi=1&modestbranding=1&rel=0" 
                            allow="autoplay; encrypted-media"
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="overlay-info">
                        <h3>${title.substring(0, 60)}</h3>
                        <span>@thejayabits</span>
                    </div>
                `;
                container.appendChild(reel);
            });
        }

        // Infinite Scroll logic for social media clones
        container.addEventListener('scroll', () => {
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 200) {
                if (nextPageToken) fetchVideos(nextPageToken);
            }
        });

        // Initial Load
        fetchVideos();

        // Browser gesture fix: Videos often need one click to "unblock" autoplay
        document.body.addEventListener('touchstart', function() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(i => {
                i.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            });
        }, {once: true});
    </script>
</body>
</html>
